<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Sistema de Louvor | Colaborativo - Todos Editam, Admin Gerencia</title>

        /* MODO CLARO */
        body.light-mode {

        body.light-mode .glass-card {
            background: rgba(255, 252, 245, 0.96);
            backdrop-filter: blur(8px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.06);
            border: 1px solid rgba(255, 193, 7, 0.25);
        }
        body.light-mode h1 {
            background: linear-gradient(135deg, #0B1A33, #FF9800);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        body.light-mode h2, body.light-mode h3 {
            color: #1a2a3e;
            border-left-color: #FF9800;
        }
        body.light-mode .sub, body.light-mode label {
            color: #5D4037;
        }
        body.light-mode input, body.light-mode select, body.light-mode textarea {
            background: #FFFFFF;
            border: 1.5px solid #FFDEB3;
            color: #2c2418;
        }
        body.light-mode input:focus, body.light-mode select:focus {
            border-color: #FF9800;
            box-shadow: 0 0 0 3px rgba(255, 152, 0, 0.15);
        }
        body.light-mode button {
            background: #FF9800;
            color: #1a1a1a;
        }
        body.light-mode button:hover {
            background: #FFB74D;
        }
        body.light-mode .tab {
            background: #FFF3E0;
            color: #5D4037;
        }
        body.light-mode .tab.active {
            background: #FF9800;
            color: white;
        }
        body.light-mode .card {
            background: #FFFFFF;
            border: 1px solid #FFE4B5;
        }
        body.light-mode .badge, body.light-mode .tom-badge {
            background: #FFF0DF;
            color: #BF5B00;
        }
        body.light-mode .calendar-day {
            background: white;
            border: 1px solid #FFE4B5;
        }
        body.light-mode .calendar-day.has-scale {
            background: #FFF8E7;
            border: 2px solid #FF9800;
        }
        body.light-mode .delete-btn {
            background: #FF5722;
            color: white;
        }
        body.light-mode .member-option {
            background: #FFFFFF;
            border: 1px solid #FFE4B5;
        }
        body.light-mode .modal-danger-btn {
            background: #FF5722;
            color: white;
        }
        body.light-mode .modal-cancel-btn {
            background: #e0e0e0;
            color: #333;
        }
        body.light-mode .repertorio-item {
            background: #FFF8E7;
            border-left: 4px solid #FF9800;
        }
        body.light-mode .warning-message {
            background: #FFF3E0;
            border: 1px solid #FFB74D;
            color: #E65100;
        }
        body.light-mode .search-box {
            background: white;
            border: 1px solid #FFDEB3;
        }
        body.light-mode .submenu-btn {
            background: #FFF3E0;
            color: #5D4037;
        }
        body.light-mode .submenu-btn.active {
            background: #FF9800;
            color: white;
        }

        /* MODO ESCURO */
        body.dark-mode {
            background: linear-gradient(135deg, #0d1f3c 0%, #07152b 100%);
        }
        body.dark-mode .glass-card {
            background: rgba(13, 31, 60, 0.96);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 193, 7, 0.4);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }
        body.dark-mode h1 {
            background: linear-gradient(135deg, #FFE082, #FFB74D);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        body.dark-mode h2, body.dark-mode h3 {
            color: #FFE082;
            border-left-color: #FFB74D;
        }
        body.dark-mode .sub, body.dark-mode label {
            color: #FFDEB3;
        }
        body.dark-mode p, body.dark-mode span, body.dark-mode div, body.dark-mode strong {
            color: #FFEFD5;
        }
        body.dark-mode input, body.dark-mode select, body.dark-mode textarea {
            background: #1e3a5f;
            border: 1.5px solid #FFB74D;
            color: #FFF8E1;
        }
        body.dark-mode input:focus, body.dark-mode select:focus {
            border-color: #FFC107;
            box-shadow: 0 0 0 3px rgba(255, 193, 7, 0.25);
            background: #2a4a74;
        }
        body.dark-mode button {
            background: #FF9800;
            color: #0d1f3c;
            font-weight: 700;
        }
        body.dark-mode button:hover {
            background: #FFC107;
        }
        body.dark-mode .tab {
            background: #1e3a5f;
            color: #FFE0B2;
        }
        body.dark-mode .tab.active {
            background: #FF9800;
            color: #0d1f3c;
        }
        body.dark-mode .card {
            background: #1e3a5f;
            border: 1px solid #FFB74D;
        }
        body.dark-mode .badge, body.dark-mode .tom-badge {
            background: #FFB74D;
            color: #0d1f3c;
        }
        body.dark-mode .calendar-day {
            background: #1e3a5f;
            border: 1px solid #FFB74D;
        }
        body.dark-mode .calendar-day .day-number {
            color: #FFE082;
        }
        body.dark-mode .calendar-day.has-scale {
            background: #2a4a74;
            border: 2px solid #FFC107;
        }
        body.dark-mode .scale-member {
            background: rgba(255, 152, 0, 0.3);
            color: #FFEFD5;
        }
        body.dark-mode .delete-btn {
            background: #FF5722;
            color: white;
        }
        body.dark-mode .member-option {
            background: #1e3a5f;
            border: 1px solid #FFB74D;
            color: #FFEFD5;
        }
        body.dark-mode .member-option.selected {
            background: #FFB74D;
            color: #0d1f3c;
        }
        body.dark-mode .modal-danger-btn {
            background: #FF5722;
            color: white;
        }
        body.dark-mode .modal-cancel-btn {
            background: #2a4a74;
            color: #FFE0B2;
        }
        body.dark-mode .repertorio-item {
            background: #1a3a5a;
            border-left: 4px solid #FFC107;
        }
        body.dark-mode .warning-message {
            background: #1a3a5a;
            border: 1px solid #FFB74D;
            color: #FFE082;
        }
        body.dark-mode .search-box {
            background: #1e3a5f;
            border: 1px solid #FFB74D;
            color: #FFF8E1;
        }
        body.dark-mode .submenu-btn {
            background: #1e3a5f;
            color: #FFE0B2;
        }
        body.dark-mode .submenu-btn.active {
            background: #FF9800;
            color: #0d1f3c;
        }

        /* ESTILOS GLOBAIS */
        .glass-card {
            border-radius: 28px;
            padding: 2rem;
            transition: all 0.2s;
        }
        .container {
            max-width: 1300px;
            width: 100%;
            margin: 0 auto;
            padding: 1rem;
        }
        .login-container {
            max-width: 450px;
            width: 100%;
            margin: 0 auto;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            text-align: center;
        }
        h2 {
            font-size: 1.35rem;
            font-weight: 600;
            margin: 1.5rem 0 1rem 0;
            padding-left: 1rem;
            border-left-width: 4px;
            border-left-style: solid;
        }
        h3 {
            font-size: 1rem;
            font-weight: 600;
            margin: 1rem 0 0.75rem 0;
            padding-left: 0.75rem;
            border-left-width: 3px;
            border-left-style: solid;
        }
        .sub {
            margin-bottom: 1.5rem;
            font-weight: 500;
            font-size: 0.9rem;
            text-align: center;
            opacity: 0.8;
        }
        .input-group {
            margin-bottom: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }
        label {
            font-weight: 600;
            font-size: 0.8rem;
            letter-spacing: 0.3px;
        }
        input, select, textarea {
            padding: 0.8rem 1rem;
            border-radius: 18px;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.2s;
            font-weight: 500;
        }
        button {
            border: none;
            padding: 0.7rem 1.3rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        button:hover {
            transform: translateY(-2px);
        }
        .btn-full {
            width: 100%;
        }
        .tabs {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 1.8rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid rgba(255, 152, 0, 0.3);
        }
        .tab {
            padding: 0.55rem 1.2rem;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        .card {
            padding: 1rem;
            border-radius: 20px;
            margin-bottom: 0.8rem;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1rem;
        }
        .message-area {
            margin: 1rem 0;
            padding: 0.8rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            text-align: center;
            font-weight: 500;
        }
        .small-btn {
            padding: 0.3rem 0.8rem;
            font-size: 0.7rem;
        }
        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .tom-badge, .badge {
            display: inline-block;
            padding: 0.2rem 0.7rem;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
            margin: 0.2rem 0.2rem;
        }
        .calendar-header {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-weight: 700;
            font-size: 0.8rem;
            margin-bottom: 0.5rem;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 0.5rem;
        }
        .calendar-day {
            min-height: 95px;
            padding: 0.5rem;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .calendar-day:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 14px rgba(0,0,0,0.15);
        }
        .calendar-day.empty {
            opacity: 0.4;
            cursor: default;
        }
        .day-number {
            font-weight: 700;
            font-size: 0.9rem;
            margin-bottom: 0.4rem;
        }
        .scale-members {
            font-size: 0.65rem;
            max-height: 65px;
            overflow-y: auto;
        }
        .scale-member {
            border-radius: 12px;
            padding: 0.15rem 0.3rem;
            margin: 0.15rem 0;
            font-size: 0.6rem;
            font-weight: 500;
        }
        .month-selector {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            max-width: 500px;
            width: 90%;
            border-radius: 28px;
            padding: 1.5rem;
        }
        .modal-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
            justify-content: flex-end;
        }
        .member-select-list {
            max-height: 300px;
            overflow-y: auto;
        }
        .member-option {
            padding: 0.7rem;
            margin: 0.4rem 0;
            border-radius: 16px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .two-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }
        .cloud-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.7rem;
            padding: 0.3rem 0.8rem;
            border-radius: 40px;
        }
        .admin-section {
            padding: 1rem;
            border-radius: 20px;
            margin-bottom: 1rem;
        }
        .auth-links {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-top: 1rem;
        }
        .auth-link {
            background: none;
            text-decoration: underline;
            cursor: pointer;
            font-size: 0.85rem;
            padding: 0;
        }
        .music-link {
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }
        .dont-ask-row {
            margin-top: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .repertorio-item {
            padding: 1rem;
            border-radius: 16px;
            margin-bottom: 0.8rem;
            transition: all 0.2s;
        }
        .warning-message {
            padding: 0.8rem;
            border-radius: 16px;
            text-align: center;
            font-size: 0.85rem;
            margin-bottom: 1rem;
        }
        .week-selector {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            align-items: center;
        }
        .search-box {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            border-radius: 40px;
            margin-bottom: 1rem;
        }
        .search-box input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 0.5rem;
        }
        .search-box input:focus {
            box-shadow: none;
        }
        .submenu {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .submenu-btn {
            padding: 0.5rem 1rem;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.2s;
            border: none;
        }
        .cantor-card {
            cursor: pointer;
            transition: all 0.2s;
        }
        .cantor-card:hover {
            transform: translateX(5px);
            background: rgba(255, 152, 0, 0.15);
        }
        @media (max-width: 750px) {
            .container { padding: 0.5rem; }
            .glass-card { padding: 1.2rem; }
            .two-columns { grid-template-columns: 1fr; }
            .calendar-day { min-height: 70px; }
            h1 { font-size: 1.4rem; }
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .syncing { animation: pulse 1s infinite; }
        footer { text-align: center; font-size: 0.7rem; margin-top: 2rem; opacity: 0.7; }
        hr { margin: 1rem 0; }
    </style>
</head>

                <div v-if="showSetupModal" class="modal-overlay" @click.self="cancelarSetup"><div class="glass-card" style="max-width:400px;"><h2>✨ Criar sua senha</h2><p>Olá <strong>{{ pendingEmail }}</strong>, defina sua senha</p><div class="input-group"><label>Senha (mín 4)</label><input type="password" v-model="setupPwd"></div><div class="input-group"><label>Confirmar</label><input type="password" v-model="setupConfirm"></div><button @click="finalizarSetup">Salvar e Entrar</button><button @click="cancelarSetup" class="small-btn delete-btn" style="margin-top:8px;">Cancelar</button></div></div>
            </div>
        `,
        data() {
            return {
                currentUser: null, loginEmail: "", loginPassword: "", loginMessage: "", loginMessageType: "",
                globalMessage: "", globalMsgType: "", activeTab: "repertorio", syncActive: false,
                modoCriarConta: false, criarEmail: "",
                repertorioSemanal: {},
                semanaOffset: 0,
                novaMusicaRepertorio: { musicaId: "", cantor: "", tom: "", observacao: "" },
                ano: new Date().getFullYear(), mes: new Date().getMonth(), escalaData: {},
                modalEscalaVisible: false, diaSelecionado: null, membrosSelecionadosTemp: [],
                musicas: [], musicasFiltradas: [], buscaMusica: "",
                novaMusica: { nome: "", link: "", tomOriginal: "", letra: "" }, 
                mostrarFormMusica: false, tons: TONS,
                musicasSubmenu: "principal",
                cantorSelecionado: null,
                tomsTemp: {},
                eventos: [], novoEvento: { nome: "", data: "", horario: "", responsaveis: "" },
                membros: [], novoMembro: { nome: "", email: "", funcao: "canta", instrumentosSelecionados: [] }, mostrarFormMembro: false, instrumentos: INSTRUMENTOS,
                usuariosSistema: [], novoUsuarioEmail: "", adminNewPassword: "", adminConfirmPassword: "",
                showSetupModal: false, pendingEmail: "", setupPwd: "", setupConfirm: "",
                modalConfirm: { visible: false, title: "", message: "", confirmText: "Sim", action: null, actionData: null, showDontAsk: false, dontAskAgain: false, storageKey: "" }
            }
        },
        computed: {
            nomeMes() { return ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"][this.mes]; },
            diasCalendario() {
                const primeiro = new Date(this.ano, this.mes, 1), ultimo = new Date(this.ano, this.mes+1, 0), dias = [];
                for(let i=0; i<primeiro.getDay(); i++) dias.push(null);
                for(let i=1; i<=ultimo.getDate(); i++) dias.push(new Date(this.ano, this.mes, i));
                return dias;
            },
            cantoresLista() { return this.membros.filter(m => m.funcao === 'canta' || m.funcao === 'ambos'); },
            musicasOrdenadas() { return [...this.musicas].sort((a, b) => a.nome.localeCompare(b.nome)); },
            repertorioSemana() { const chave = this.getSemanaKey(); return this.repertorioSemanal[chave] || []; },
            tituloSemana() {
                const data = this.getDataInicioSemana();
                const dataFim = new Date(data);
                dataFim.setDate(dataFim.getDate() + 6);
                return `${data.getDate()}/${data.getMonth()+1} a ${dataFim.getDate()}/${dataFim.getMonth()+1}/${data.getFullYear()}`;
            }
        },
        methods: {
            formatDateKey(d) { return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`; },
            getSemanaKey() {
                const hoje = new Date();
                const data = new Date(hoje);
                data.setDate(hoje.getDate() + (this.semanaOffset * 7));
                const primeiroDiaSemana = new Date(data.getFullYear(), data.getMonth(), data.getDate() - data.getDay());
                return `${primeiroDiaSemana.getFullYear()}-${primeiroDiaSemana.getMonth()+1}-${primeiroDiaSemana.getDate()}`;
            },
            getDataInicioSemana() {
                const hoje = new Date();
                const data = new Date(hoje);
                data.setDate(hoje.getDate() + (this.semanaOffset * 7));
                return new Date(data.getFullYear(), data.getMonth(), data.getDate() - data.getDay());
            },
            musicasDoCantor(cantorNome) { return this.musicas.filter(m => m.tonsCantores?.some(t => t.cantor === cantorNome)); },
            getTomCantor(musicaId, cantorNome) {
                const musica = this.musicas.find(m => m.id === musicaId);
                if (!musica || !musica.tonsCantores) return null;
                const tomInfo = musica.tonsCantores.find(t => t.cantor === cantorNome);
                return tomInfo ? tomInfo.tom : null;
            },
            filtrarMusicas() {
                const termo = this.buscaMusica.toLowerCase().trim();
                if (!termo) { this.musicasFiltradas = this.musicasOrdenadas; return; }
                this.musicasFiltradas = this.musicasOrdenadas.filter(m => {
                    if (m.nome.toLowerCase().includes(termo)) return true;
                    if (m.letra && m.letra.toLowerCase().includes(termo)) return true;
                    return false;
                });
            },
            selecionarCantor(nome) { this.cantorSelecionado = nome; this.tomsTemp = {}; },
            async definirTomCantor(musicaId, cantorNome) {
                const tom = this.tomsTemp[musicaId];
                if (!tom) { this.showMsg("Selecione um tom", "error-msg"); return; }
                const musica = this.musicas.find(m => m.id === musicaId);
                if (!musica) return;
                if (!musica.tonsCantores) musica.tonsCantores = [];
                const existingIndex = musica.tonsCantores.findIndex(t => t.cantor === cantorNome);
                if (existingIndex !== -1) { musica.tonsCantores[existingIndex].tom = tom; } 
                else { musica.tonsCantores.push({ cantor: cantorNome, tom: tom }); }
                this.tomsTemp[musicaId] = "";
                await this.afterUpdate();
                this.showMsg(`Tom definido para ${musica.nome} - ${cantorNome}: ${tom}`, "success-msg");
            },
            async removerTomCantor(musicaId, cantorNome) {
                const musica = this.musicas.find(m => m.id === musicaId);
                if (musica && musica.tonsCantores) {
                    musica.tonsCantores = musica.tonsCantores.filter(t => t.cantor !== cantorNome);
                    await this.afterUpdate();
                    this.showMsg(`Tom removido para ${musica.nome} - ${cantorNome}`, "success-msg");
                }
            },
            semanaAnterior() { this.semanaOffset--; },
            proximaSemana() { this.semanaOffset++; },
            semanaAtual() { this.semanaOffset = 0; },
            
            async syncToCloud() {
                if (this.syncActive) return;
                this.syncActive = true;
                const dados = { 
                    [CLOUD_KEYS.membros]: this.membros, 
                    [CLOUD_KEYS.musicas]: this.musicas, 
                    [CLOUD_KEYS.eventos]: this.eventos, 
                    [CLOUD_KEYS.escala]: this.escalaData, 
                    [CLOUD_KEYS.usuarios]: this.usuariosSistema,
                    [CLOUD_KEYS.repertorio]: this.repertorioSemanal
                };
                const ok = await salvarNaNuvem(dados);
                if (ok) this.showMsg("✅ Sincronizado", "success-msg");
                else this.showMsg("⚠️ Erro na sincronização", "error-msg");
                this.syncActive = false;
            },
            async carregarTudo() {
                this.syncActive = true;
                const dadosNuvem = await carregarDaNuvem();
                if (dadosNuvem && dadosNuvem[CLOUD_KEYS.membros]?.length) {
                    this.membros = dadosNuvem[CLOUD_KEYS.membros];
                    this.musicas = dadosNuvem[CLOUD_KEYS.musicas];
                    this.eventos = dadosNuvem[CLOUD_KEYS.eventos];
                    this.escalaData = dadosNuvem[CLOUD_KEYS.escala] || {};
                    this.usuariosSistema = dadosNuvem[CLOUD_KEYS.usuarios];
                    this.repertorioSemanal = dadosNuvem[CLOUD_KEYS.repertorio] || {};
                } else {
                    this.membros = [];
                    this.musicas = [];
                    this.eventos = [];
                    this.escalaData = {};
                    this.usuariosSistema = getDefaultUsuarios();
                    this.repertorioSemanal = {};
                    await this.syncToCloud();
                }
                this.musicasFiltradas = this.musicasOrdenadas;
                this.syncActive = false;
            },
            async afterUpdate() { await this.syncToCloud(); },
            setLightMode() { document.body.classList.add('light-mode'); document.body.classList.remove('dark-mode'); localStorage.setItem('theme', 'light'); },
            setDarkMode() { document.body.classList.add('dark-mode'); document.body.classList.remove('light-mode'); localStorage.setItem('theme', 'dark'); },
            showMsg(msg, type) { this.globalMessage = msg; this.globalMsgType = type; setTimeout(() => this.globalMessage = "", 3000); },
            
            adicionarAoRepertorio() {
                if (!this.novaMusicaRepertorio.musicaId) { this.showMsg("Selecione uma música", "error-msg"); return; }
                if (!this.novaMusicaRepertorio.cantor) { this.showMsg("Selecione o cantor", "error-msg"); return; }
                if (!this.novaMusicaRepertorio.tom) { this.showMsg("Selecione o tom", "error-msg"); return; }
                const musica = this.musicas.find(m => m.id == this.novaMusicaRepertorio.musicaId);
                if (!musica) { this.showMsg("Música não encontrada", "error-msg"); return; }
                const chave = this.getSemanaKey();
                if (!this.repertorioSemanal[chave]) this.repertorioSemanal[chave] = [];
                this.repertorioSemanal[chave].push({
                    musicaId: musica.id, nome: musica.nome, link: musica.link,
                    cantor: this.novaMusicaRepertorio.cantor, tom: this.novaMusicaRepertorio.tom,
                    observacao: this.novaMusicaRepertorio.observacao
                });
                this.novaMusicaRepertorio = { musicaId: "", cantor: "", tom: "", observacao: "" };
                this.afterUpdate();
                this.showMsg("Música adicionada ao repertório!", "success-msg");
            },
            removerDoRepertorio(idx) {
                const chave = this.getSemanaKey();
                this.repertorioSemanal[chave].splice(idx, 1);
                if (this.repertorioSemanal[chave].length === 0) delete this.repertorioSemanal[chave];
                this.afterUpdate();
                this.showMsg("Música removida do repertório", "success-msg");
            },
            
            confirmarAcao(title, message, action, actionData, confirmText = "Sim", showDontAsk = false, storageKey = "") {
                if (showDontAsk && storageKey && localStorage.getItem(storageKey) === 'true') { action(actionData); return; }
                this.modalConfirm = { visible: true, title, message, confirmText, action, actionData, showDontAsk, dontAskAgain: false, storageKey };
            },
            fecharModalConfirm() { this.modalConfirm.visible = false; this.modalConfirm.dontAskAgain = false; },
            executarAcaoConfirmada() {
                if (this.modalConfirm.action) this.modalConfirm.action(this.modalConfirm.actionData);
                if (this.modalConfirm.showDontAsk && this.modalConfirm.dontAskAgain && this.modalConfirm.storageKey) localStorage.setItem(this.modalConfirm.storageKey, 'true');
                this.fecharModalConfirm();
            },
            
            confirmarRemoverMusica(musica) { this.confirmarAcao("Remover Música", `Remover "${musica.nome}"?`, this.executarRemoverMusica, musica.id, "Sim", true, "dont_ask_remover_musica"); },
            async executarRemoverMusica(id) { this.musicas = this.musicas.filter(m => m.id !== id); this.musicasFiltradas = this.musicasOrdenadas; await this.afterUpdate(); this.showMsg("Música removida!", "success-msg"); },
            confirmarRemoverEvento(idx) { const evento = this.eventos[idx]; this.confirmarAcao("Remover Evento", `Remover "${evento.nome}"?`, this.executarRemoverEvento, idx, "Sim", true, "dont_ask_remover_evento"); },
            async executarRemoverEvento(idx) { this.eventos.splice(idx, 1); await this.afterUpdate(); this.showMsg("Evento removido!", "success-msg"); },
            confirmarRemoverMembro(membro) { this.confirmarAcao("Remover Membro", `Remover "${membro.nome}"?`, this.executarRemoverMembro, membro.id, "Sim", true, "dont_ask_remover_membro"); },
            async executarRemoverMembro(id) { this.membros = this.membros.filter(m => m.id !== id); for (let chave in this.escalaData) { this.escalaData[chave] = this.escalaData[chave].filter(m => m.id !== id); if (this.escalaData[chave].length === 0) delete this.escalaData[chave]; } await this.afterUpdate(); this.showMsg("Membro removido!", "success-msg"); },
            confirmarRemoverUsuario(user) { this.confirmarAcao("Remover Acesso", `Remover acesso de "${user.email}"?`, this.executarRemoverUsuario, user.email, "Sim", true, "dont_ask_remover_usuario"); },
            async executarRemoverUsuario(email) { this.usuariosSistema = this.usuariosSistema.filter(u => u.email !== email); await this.afterUpdate(); this.showMsg("Usuário removido!", "success-msg"); },
            confirmarLimparEscalaDia() { if (!this.diaSelecionado) return; this.confirmarAcao("Limpar Escala", `Limpar escala do dia ${this.diaSelecionado.getDate()}/${this.diaSelecionado.getMonth()+1}?`, this.executarLimparEscalaDia, null, "Sim", true, "dont_ask_limpar_escala_dia"); },
            async executarLimparEscalaDia() { delete this.escalaData[this.formatDateKey(this.diaSelecionado)]; this.fecharModalEscala(); await this.afterUpdate(); this.showMsg("Dia limpo!", "success-msg"); },
            
            mesAnterior() { if(this.mes===0){this.mes=11;this.ano--}else{this.mes--} },
            proximoMes() { if(this.mes===11){this.mes=0;this.ano++}else{this.mes++} },
            mesAtual() { this.ano=new Date().getFullYear(); this.mes=new Date().getMonth(); },
            abrirModalEscala(dia) { this.diaSelecionado=dia; const chave=this.formatDateKey(dia); this.membrosSelecionadosTemp=(this.escalaData[chave]||[]).map(m=>m.id); this.modalEscalaVisible=true; },
            fecharModalEscala() { this.modalEscalaVisible=false; this.diaSelecionado=null; },
            membroSelecionado(id) { return this.membrosSelecionadosTemp.includes(id); },
            toggleMembroEscala(id) { const idx=this.membrosSelecionadosTemp.indexOf(id); idx===-1?this.membrosSelecionadosTemp.push(id):this.membrosSelecionadosTemp.splice(idx,1); },
            async salvarEscalaDia() { const chave=this.formatDateKey(this.diaSelecionado); this.escalaData[chave]=this.membros.filter(m=>this.membrosSelecionadosTemp.includes(m.id)); this.fecharModalEscala(); await this.afterUpdate(); this.showMsg("Escala salva","success-msg"); },
            async salvarMusica() { if(!this.novaMusica.nome||!this.novaMusica.link){this.showMsg("Preencha nome e link","error-msg");return;} this.musicas.push({id:Date.now(),nome:this.novaMusica.nome,link:this.novaMusica.link,tomOriginal:this.novaMusica.tomOriginal,letra:this.novaMusica.letra,tonsCantores:[]}); this.novaMusica={nome:"",link:"",tomOriginal:"",letra:""}; this.mostrarFormMusica=false; this.musicasFiltradas = this.musicasOrdenadas; await this.afterUpdate(); this.showMsg("Música adicionada!","success-msg"); },
            async adicionarEvento() { if(!this.novoEvento.nome||!this.novoEvento.data){this.showMsg("Preencha nome e data","error-msg");return;} this.eventos.push({...this.novoEvento}); this.novoEvento={nome:"",data:"",horario:"",responsaveis:""}; await this.afterUpdate(); this.showMsg("Evento adicionado!","success-msg"); },
            async salvarMembro() { if(!this.novoMembro.nome||!this.novoMembro.email){this.showMsg("Nome e e-mail obrigatórios","error-msg");return;} this.membros.push({id:Date.now(),nome:this.novoMembro.nome,email:this.novoMembro.email,funcao:this.novoMembro.funcao,instrumentos:[...this.novoMembro.instrumentosSelecionados]}); this.novoMembro={nome:"",email:"",funcao:"canta",instrumentosSelecionados:[]}; this.mostrarFormMembro=false; await this.afterUpdate(); this.showMsg("Membro adicionado!","success-msg"); },
            async adicionarUsuarioSistema() { if(!this.novoUsuarioEmail.trim()){this.showMsg("Digite um e-mail","error-msg");return;} if(this.usuariosSistema.find(u=>u.email===this.novoUsuarioEmail)){this.showMsg("E-mail já cadastrado","error-msg");return;} this.usuariosSistema.push({email:this.novoUsuarioEmail,password:"",isAdmin:false,canLogin:true}); this.novoUsuarioEmail=""; await this.afterUpdate(); this.showMsg("Usuário autorizado!","success-msg"); },
            async changeAdminPassword() { if(!this.adminNewPassword||this.adminNewPassword!==this.adminConfirmPassword||this.adminNewPassword.length<4){this.showMsg("Senhas inválidas","error-msg");return;} const admin=this.usuariosSistema.find(u=>u.email===this.currentUser.email); if(admin){admin.password=this.adminNewPassword;this.currentUser.password=this.adminNewPassword;await this.afterUpdate();this.showMsg("Senha atualizada!","success-msg");this.adminNewPassword="";this.adminConfirmPassword="";} },
            async verificarECriarConta() {
                const email = this.criarEmail.trim();
                if(!email){this.loginMessage="Digite um e-mail";this.loginMessageType="error-msg";return;}
                const userExists = this.usuariosSistema.find(u => u.email.toLowerCase() === email.toLowerCase());
                if(!userExists){ this.loginMessage="❌ E-mail não autorizado. Solicite acesso à administradora."; this.loginMessageType="warning-msg"; return; }
                if(userExists.password && userExists.password !== ""){ this.loginMessage="✅ Já possui cadastro! Faça login."; this.loginMessageType="info-msg"; this.modoCriarConta = false; return; }
                this.pendingEmail = email; this.showSetupModal = true; this.criarEmail = ""; this.modoCriarConta = false;
            },
            async doLogin() {
                const email=this.loginEmail.trim(), pwd=this.loginPassword;
                if(!email||!pwd){this.loginMessage="Preencha e-mail e senha";this.loginMessageType="error-msg";return;}
                const user=this.usuariosSistema.find(u=>u.email.toLowerCase()===email.toLowerCase());
                if(user&&!user.password){this.pendingEmail=email;this.showSetupModal=true;this.loginPassword="";return;}
                if(user&&user.password===pwd&&user.canLogin){this.currentUser=user;this.loginEmail="";this.loginPassword="";this.showMsg("Bem-vindo(a)!","success-msg");}
                else{this.loginMessage="Credenciais inválidas";this.loginMessageType="error-msg";}
            },
            logout() { this.currentUser=null; this.activeTab="repertorio"; this.modoCriarConta=false; this.loginEmail=""; this.loginPassword=""; this.semanaOffset=0; this.cantorSelecionado=null; },
            async finalizarSetup() { 
                if(!this.setupPwd||this.setupPwd.length<4||this.setupPwd!==this.setupConfirm){ this.showMsg("Senha inválida (mínimo 4)","error-msg"); return; }
                const user=this.usuariosSistema.find(u=>u.email===this.pendingEmail);
                if(user){ user.password=this.setupPwd; this.currentUser=user; await this.afterUpdate(); this.showSetupModal=false; this.setupPwd=""; this.setupConfirm=""; this.showMsg("Senha criada!","success-msg"); }
            },
            cancelarSetup() { this.showSetupModal=false; this.setupPwd=""; this.setupConfirm=""; }
        },
        async mounted() {
            const savedTheme=localStorage.getItem('theme'); 
            if(savedTheme==='dark') this.setDarkMode(); else this.setLightMode();
            await this.carregarTudo();
        },
        watch: {
            membros: { deep: true, handler() { this.afterUpdate(); } },
            musicas: { deep: true, handler() { this.afterUpdate(); } },
            eventos: { deep: true, handler() { this.afterUpdate(); } },
            escalaData: { deep: true, handler() { this.afterUpdate(); } },
            usuariosSistema: { deep: true, handler() { this.afterUpdate(); } },
            repertorioSemanal: { deep: true, handler() { this.afterUpdate(); } },
            buscaMusica() { this.filtrarMusicas(); }
        }
    });
</script>
</body>
</html>

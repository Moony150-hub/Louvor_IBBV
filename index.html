<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Sistema de Louvor | Nuvem - Escala, Músicas, Eventos e Membros</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            transition: background-color 0.3s ease, color 0.2s ease;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* MODO CLARO */
        body.light-mode {
            background: linear-gradient(135deg, #FFF9F0 0%, #FFEFD5 100%);
        }
        body.light-mode .glass-card {
            background: rgba(255, 252, 245, 0.96);
            backdrop-filter: blur(8px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.06);
            border: 1px solid rgba(255, 193, 7, 0.25);
        }
        body.light-mode h1 {
            background: linear-gradient(135deg, #0B1A33, #FF9800);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        body.light-mode h2, body.light-mode h3 {
            color: #1a2a3e;
            border-left-color: #FF9800;
        }
        body.light-mode .sub, body.light-mode label {
            color: #5D4037;
        }
        body.light-mode input, body.light-mode select, body.light-mode textarea {
            background: #FFFFFF;
            border: 1.5px solid #FFDEB3;
            color: #2c2418;
        }
        body.light-mode button {
            background: #FF9800;
            color: #1a1a1a;
        }
        body.light-mode button:hover {
            background: #FFB74D;
        }
        body.light-mode .tab {
            background: #FFF3E0;
            color: #5D4037;
        }
        body.light-mode .tab.active {
            background: #FF9800;
            color: white;
        }
        body.light-mode .card {
            background: #FFFFFF;
            border: 1px solid #FFE4B5;
        }
        body.light-mode .badge, body.light-mode .tom-badge {
            background: #FFF0DF;
            color: #BF5B00;
        }
        body.light-mode .calendar-day {
            background: white;
            border: 1px solid #FFE4B5;
        }
        body.light-mode .calendar-day.has-scale {
            background: #FFF8E7;
            border: 2px solid #FF9800;
        }
        body.light-mode .delete-btn {
            background: #FF5722;
            color: white;
        }
        body.light-mode .member-option {
            background: #FFFFFF;
            border: 1px solid #FFE4B5;
        }
        body.light-mode .modal-danger-btn {
            background: #FF5722;
            color: white;
        }
        body.light-mode .modal-cancel-btn {
            background: #e0e0e0;
            color: #333;
        }

        /* MODO ESCURO */
        body.dark-mode {
            background: linear-gradient(135deg, #0d1f3c 0%, #07152b 100%);
        }
        body.dark-mode .glass-card {
            background: rgba(13, 31, 60, 0.96);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 193, 7, 0.4);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }
        body.dark-mode h1 {
            background: linear-gradient(135deg, #FFE082, #FFB74D);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        body.dark-mode h2, body.dark-mode h3 {
            color: #FFE082;
            border-left-color: #FFB74D;
        }
        body.dark-mode .sub, body.dark-mode label {
            color: #FFDEB3;
        }
        body.dark-mode p, body.dark-mode span, body.dark-mode div, body.dark-mode strong {
            color: #FFEFD5;
        }
        body.dark-mode input, body.dark-mode select, body.dark-mode textarea {
            background: #1e3a5f;
            border: 1.5px solid #FFB74D;
            color: #FFF8E1;
        }
        body.dark-mode input:focus, body.dark-mode select:focus {
            border-color: #FFC107;
            box-shadow: 0 0 0 3px rgba(255, 193, 7, 0.25);
            background: #2a4a74;
        }
        body.dark-mode button {
            background: #FF9800;
            color: #0d1f3c;
            font-weight: 700;
        }
        body.dark-mode button:hover {
            background: #FFC107;
        }
        body.dark-mode .tab {
            background: #1e3a5f;
            color: #FFE0B2;
        }
        body.dark-mode .tab.active {
            background: #FF9800;
            color: #0d1f3c;
        }
        body.dark-mode .card {
            background: #1e3a5f;
            border: 1px solid #FFB74D;
        }
        body.dark-mode .badge, body.dark-mode .tom-badge {
            background: #FFB74D;
            color: #0d1f3c;
        }
        body.dark-mode .calendar-day {
            background: #1e3a5f;
            border: 1px solid #FFB74D;
        }
        body.dark-mode .calendar-day .day-number {
            color: #FFE082;
        }
        body.dark-mode .calendar-day.has-scale {
            background: #2a4a74;
            border: 2px solid #FFC107;
        }
        body.dark-mode .scale-member {
            background: rgba(255, 152, 0, 0.3);
            color: #FFEFD5;
        }
        body.dark-mode .delete-btn {
            background: #FF5722;
            color: white;
        }
        body.dark-mode .member-option {
            background: #1e3a5f;
            border: 1px solid #FFB74D;
            color: #FFEFD5;
        }
        body.dark-mode .member-option.selected {
            background: #FFB74D;
            color: #0d1f3c;
        }
        body.dark-mode .modal-danger-btn {
            background: #FF5722;
            color: white;
        }
        body.dark-mode .modal-cancel-btn {
            background: #2a4a74;
            color: #FFE0B2;
        }

        /* ESTILOS GLOBAIS */
        .glass-card {
            border-radius: 28px;
            padding: 2rem;
            transition: all 0.2s;
        }
        .container {
            max-width: 1300px;
            width: 100%;
            margin: 0 auto;
            padding: 1rem;
        }
        .login-container {
            max-width: 450px;
            width: 100%;
            margin: 0 auto;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            text-align: center;
        }
        h2 {
            font-size: 1.35rem;
            font-weight: 600;
            margin: 1.5rem 0 1rem 0;
            padding-left: 1rem;
            border-left-width: 4px;
            border-left-style: solid;
        }
        h3 {
            font-size: 1rem;
            font-weight: 600;
            margin: 1rem 0 0.75rem 0;
            padding-left: 0.75rem;
            border-left-width: 3px;
            border-left-style: solid;
        }
        .sub {
            margin-bottom: 1.5rem;
            font-weight: 500;
            font-size: 0.9rem;
            text-align: center;
            opacity: 0.8;
        }
        .input-group {
            margin-bottom: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }
        label {
            font-weight: 600;
            font-size: 0.8rem;
            letter-spacing: 0.3px;
        }
        input, select, textarea {
            padding: 0.8rem 1rem;
            border-radius: 18px;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.2s;
            font-weight: 500;
        }
        button {
            border: none;
            padding: 0.7rem 1.3rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        button:hover {
            transform: translateY(-2px);
        }
        .btn-full {
            width: 100%;
        }
        .tabs {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 1.8rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid rgba(255, 152, 0, 0.3);
        }
        .tab {
            padding: 0.55rem 1.2rem;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        .card {
            padding: 1rem;
            border-radius: 20px;
            margin-bottom: 0.8rem;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1rem;
        }
        .message-area {
            margin: 1rem 0;
            padding: 0.8rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            text-align: center;
            font-weight: 500;
        }
        .small-btn {
            padding: 0.3rem 0.8rem;
            font-size: 0.7rem;
        }
        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .tom-badge, .badge {
            display: inline-block;
            padding: 0.2rem 0.7rem;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
            margin: 0.2rem 0.2rem;
        }
        .calendar-header {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-weight: 700;
            font-size: 0.8rem;
            margin-bottom: 0.5rem;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 0.5rem;
        }
        .calendar-day {
            min-height: 95px;
            padding: 0.5rem;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .calendar-day:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 14px rgba(0,0,0,0.15);
        }
        .calendar-day.empty {
            opacity: 0.4;
            cursor: default;
        }
        .day-number {
            font-weight: 700;
            font-size: 0.9rem;
            margin-bottom: 0.4rem;
        }
        .scale-members {
            font-size: 0.65rem;
            max-height: 65px;
            overflow-y: auto;
        }
        .scale-member {
            border-radius: 12px;
            padding: 0.15rem 0.3rem;
            margin: 0.15rem 0;
            font-size: 0.6rem;
            font-weight: 500;
        }
        .month-selector {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            max-width: 450px;
            width: 90%;
            border-radius: 28px;
            padding: 1.5rem;
        }
        .modal-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
            justify-content: flex-end;
        }
        .member-select-list {
            max-height: 300px;
            overflow-y: auto;
        }
        .member-option {
            padding: 0.7rem;
            margin: 0.4rem 0;
            border-radius: 16px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .two-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }
        .cloud-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.7rem;
            padding: 0.3rem 0.8rem;
            border-radius: 40px;
        }
        .cantor-nome {
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        .admin-section {
            padding: 1rem;
            border-radius: 20px;
            margin-bottom: 1rem;
        }
        .auth-links {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-top: 1rem;
        }
        .auth-link {
            background: none;
            text-decoration: underline;
            cursor: pointer;
            font-size: 0.85rem;
            padding: 0;
        }
        .music-link {
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }
        .dont-ask-row {
            margin-top: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        @media (max-width: 750px) {
            .container { padding: 0.5rem; }
            .glass-card { padding: 1.2rem; }
            .two-columns { grid-template-columns: 1fr; }
            .calendar-day { min-height: 70px; }
            h1 { font-size: 1.4rem; }
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .syncing { animation: pulse 1s infinite; }
        footer { text-align: center; font-size: 0.7rem; margin-top: 2rem; opacity: 0.7; }
        hr { margin: 1rem 0; }
    </style>
</head>

        `,
        data() {
            return {
                currentUser: null, loginEmail: "", loginPassword: "", loginMessage: "", loginMessageType: "",
                globalMessage: "", globalMsgType: "", activeTab: "escala", syncActive: false,
                modoCriarConta: false, criarEmail: "",
                ano: new Date().getFullYear(), mes: new Date().getMonth(), escalaData: {},
                modalEscalaVisible: false, diaSelecionado: null, membrosSelecionadosTemp: [],
                musicas: [], novaMusica: { nome: "", link: "", tomOriginal: "", tonsCantoresTemp: [] }, novoTomCantor: { cantor: "", tom: "" }, mostrarFormMusica: false, tons: TONS,
                eventos: [], novoEvento: { nome: "", data: "", horario: "", responsaveis: "" },
                membros: [], novoMembro: { nome: "", email: "", funcao: "canta", instrumentosSelecionados: [] }, mostrarFormMembro: false, instrumentos: INSTRUMENTOS,
                usuariosSistema: [], novoUsuarioEmail: "", adminNewPassword: "", adminConfirmPassword: "",
                showSetupModal: false, pendingEmail: "", setupPwd: "", setupConfirm: "",
                modalConfirm: {
                    visible: false,
                    title: "",
                    message: "",
                    confirmText: "Sim",
                    action: null,
                    actionData: null,
                    showDontAsk: false,
                    dontAskAgain: false,
                    storageKey: ""

        },
        computed: {
            nomeMes() { return ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"][this.mes]; },
            diasCalendario() {
                const primeiro = new Date(this.ano, this.mes, 1), ultimo = new Date(this.ano, this.mes+1, 0), dias = [];
                for(let i=0; i<primeiro.getDay(); i++) dias.push(null);
                for(let i=1; i<=ultimo.getDate(); i++) dias.push(new Date(this.ano, this.mes, i));
                return dias;
            },
            cantoresLista() { return this.membros.filter(m => m.funcao === 'canta' || m.funcao === 'ambos'); },
            cantoresComMusicas() {
                return this.cantoresLista.map(cantor => ({

        methods: {
            formatDateKey(d) { return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`; },
            async syncToCloud() {

                const ok = await salvarNaNuvem(dados);
                if (ok) this.showMsg("✅ Sincronizado", "success-msg");
                else this.showMsg("⚠️ Erro na sincronização", "error-msg");
                this.syncActive = false;
            },
            async carregarTudo() {
                this.syncActive = true;
                const dadosNuvem = await carregarDaNuvem();
                if (dadosNuvem && dadosNuvem[CLOUD_KEYS.membros]?.length) {
                    this.membros = dadosNuvem[CLOUD_KEYS.membros];
                    this.musicas = dadosNuvem[CLOUD_KEYS.musicas];
                    this.eventos = dadosNuvem[CLOUD_KEYS.eventos];
                    this.escalaData = dadosNuvem[CLOUD_KEYS.escala] || {};
                    this.usuariosSistema = dadosNuvem[CLOUD_KEYS.usuarios];
                } else {
                    this.membros = getDefaultMembros();
                    this.musicas = getDefaultMusicas();
                    this.eventos = [];
                    this.escalaData = {};
                    this.usuariosSistema = getDefaultUsuarios();
                    await this.syncToCloud();
                }
                this.syncActive = false;
            },
            async afterUpdate() { await this.syncToCloud(); },
            setLightMode() { document.body.classList.add('light-mode'); document.body.classList.remove('dark-mode'); localStorage.setItem('theme', 'light'); },
            setDarkMode() { document.body.classList.add('dark-mode'); document.body.classList.remove('light-mode'); localStorage.setItem('theme', 'dark'); },
            showMsg(msg, type) { this.globalMessage = msg; this.globalMsgType = type; setTimeout(() => this.globalMessage = "", 3000); },
            
            // Sistema de confirmação modal (sem alert/confirm do navegador)
            confirmarAcao(title, message, action, actionData, confirmText = "Sim", showDontAsk = false, storageKey = "") {
                // Verificar se já não deve perguntar
                if (showDontAsk && storageKey && localStorage.getItem(storageKey) === 'true') {
                    action(actionData);
                    return;
                }
                this.modalConfirm = {
                    visible: true,
                    title,
                    message,
                    confirmText,
                    action,
                    actionData,
                    showDontAsk,
                    dontAskAgain: false,
                    storageKey
                };
            },
            fecharModalConfirm() {
                this.modalConfirm.visible = false;
                this.modalConfirm.dontAskAgain = false;
            },
            executarAcaoConfirmada() {
                if (this.modalConfirm.action) {
                    this.modalConfirm.action(this.modalConfirm.actionData);
                }
                if (this.modalConfirm.showDontAsk && this.modalConfirm.dontAskAgain && this.modalConfirm.storageKey) {
                    localStorage.setItem(this.modalConfirm.storageKey, 'true');
                }
                this.fecharModalConfirm();
            },
            
            // Ações com confirmação
            confirmarRemoverMusica(musica) {
                this.confirmarAcao(
                    "Remover Música", 
                    `Tem certeza que deseja remover a música "${musica.nome}"? Esta ação não pode ser desfeita.`,
                    this.executarRemoverMusica,
                    musica.id,
                    "Sim, remover",
                    true,
                    "dont_ask_remover_musica"
                );
            },
            async executarRemoverMusica(id) {
                this.musicas = this.musicas.filter(m => m.id !== id);
                await this.afterUpdate();
                this.showMsg("Música removida!", "success-msg");
            },
            
            confirmarRemoverEvento(idx) {
                const evento = this.eventos[idx];
                this.confirmarAcao(
                    "Remover Evento",
                    `Tem certeza que deseja remover o evento "${evento.nome}"?`,
                    this.executarRemoverEvento,
                    idx,
                    "Sim, remover",
                    true,
                    "dont_ask_remover_evento"
                );
            },
            async executarRemoverEvento(idx) {
                this.eventos.splice(idx, 1);
                await this.afterUpdate();
                this.showMsg("Evento removido!", "success-msg");
            },
            
            confirmarRemoverMembro(membro) {
                this.confirmarAcao(
                    "Remover Membro",
                    `Tem certeza que deseja remover o membro "${membro.nome}"? Todas as referências em escala também serão afetadas.`,
                    this.executarRemoverMembro,
                    membro.id,
                    "Sim, remover",
                    true,
                    "dont_ask_remover_membro"
                );
            },
            async executarRemoverMembro(id) {
                this.membros = this.membros.filter(m => m.id !== id);
                // Remover também das escalas
                for (let chave in this.escalaData) {
                    this.escalaData[chave] = this.escalaData[chave].filter(m => m.id !== id);
                    if (this.escalaData[chave].length === 0) delete this.escalaData[chave];
                }
                await this.afterUpdate();
                this.showMsg("Membro removido!", "success-msg");
            },
            
            confirmarRemoverUsuario(user) {
                this.confirmarAcao(
                    "Remover Acesso",
                    `Tem certeza que deseja remover o acesso do usuário "${user.email}"? Ele não poderá mais fazer login.`,
                    this.executarRemoverUsuario,
                    user.email,
                    "Sim, remover",
                    true,
                    "dont_ask_remover_usuario"
                );
            },
            async executarRemoverUsuario(email) {
                this.usuariosSistema = this.usuariosSistema.filter(u => u.email !== email);
                await this.afterUpdate();
                this.showMsg("Usuário removido!", "success-msg");
            },
            
            confirmarLimparEscalaDia() {
                this.confirmarAcao(
                    "Limpar Escala",
                    `Tem certeza que deseja limpar toda a escala do dia ${this.diaSelecionado.getDate()}/${this.diaSelecionado.getMonth()+1}?`,
                    this.executarLimparEscalaDia,
                    null,
                    "Sim, limpar",
                    true,
                    "dont_ask_limpar_escala_dia"
                );
            },
            async executarLimparEscalaDia() {
                delete this.escalaData[this.formatDateKey(this.diaSelecionado)];
                this.fecharModalEscala();
                await this.afterUpdate();
                this.showMsg("Dia limpo!", "success-msg");
            },
            
            mesAnterior() { if(this.mes===0){this.mes=11;this.ano--}else{this.mes--} },
            proximoMes() { if(this.mes===11){this.mes=0;this.ano++}else{this.mes++} },
            mesAtual() { this.ano=new Date().getFullYear(); this.mes=new Date().getMonth(); },
            abrirModalEscala(dia) { this.diaSelecionado=dia; const chave=this.formatDateKey(dia); this.membrosSelecionadosTemp=(this.escalaData[chave]||[]).map(m=>m.id); this.modalEscalaVisible=true; },
            fecharModalEscala() { this.modalEscalaVisible=false; this.diaSelecionado=null; },
            membroSelecionado(id) { return this.membrosSelecionadosTemp.includes(id); },
            toggleMembroEscala(id) { const idx=this.membrosSelecionadosTemp.indexOf(id); idx===-1?this.membrosSelecionadosTemp.push(id):this.membrosSelecionadosTemp.splice(idx,1); },
            async salvarEscalaDia() { const chave=this.formatDateKey(this.diaSelecionado); this.escalaData[chave]=this.membros.filter(m=>this.membrosSelecionadosTemp.includes(m.id)); this.fecharModalEscala(); await this.afterUpdate(); this.showMsg("Escala salva","success-msg"); },
            adicionarTomCantor() { if(!this.novoTomCantor.cantor||!this.novoTomCantor.tom){this.showMsg("Selecione cantor e tom","error-msg");return;} this.novaMusica.tonsCantoresTemp.push({...this.novoTomCantor}); this.novoTomCantor={cantor:"",tom:""}; },
            removerTomCantorTemp(idx) { this.novaMusica.tonsCantoresTemp.splice(idx,1); },
            async salvarMusica() { if(!this.novaMusica.nome||!this.novaMusica.link){this.showMsg("Preencha nome e link","error-msg");return;} this.musicas.push({id:Date.now(),...this.novaMusica,tonsCantores:[...this.novaMusica.tonsCantoresTemp]}); this.novaMusica={nome:"",link:"",tomOriginal:"",tonsCantoresTemp:[]}; this.mostrarFormMusica=false; await this.afterUpdate(); this.showMsg("Música adicionada","success-msg"); },
            async adicionarEvento() { if(!this.novoEvento.nome||!this.novoEvento.data){this.showMsg("Preencha nome e data","error-msg");return;} this.eventos.push({...this.novoEvento}); this.novoEvento={nome:"",data:"",horario:"",responsaveis:""}; await this.afterUpdate(); this.showMsg("Evento adicionado","success-msg"); },
            async salvarMembro() { if(!this.novoMembro.nome||!this.novoMembro.email){this.showMsg("Nome e e-mail obrigatórios","error-msg");return;} this.membros.push({id:Date.now(),...this.novoMembro,instrumentos:[...this.novoMembro.instrumentosSelecionados]}); this.novoMembro={nome:"",email:"",funcao:"canta",instrumentosSelecionados:[]}; this.mostrarFormMembro=false; await this.afterUpdate(); this.showMsg("Membro adicionado","success-msg"); },
            async adicionarUsuarioSistema() { if(!this.novoUsuarioEmail.trim()){this.showMsg("Digite um e-mail","error-msg");return;} if(this.usuariosSistema.find(u=>u.email===this.novoUsuarioEmail)){this.showMsg("E-mail já cadastrado","error-msg");return;} this.usuariosSistema.push({email:this.novoUsuarioEmail,password:"",isAdmin:false,canLogin:true}); this.novoUsuarioEmail=""; await this.afterUpdate(); this.showMsg("Usuário autorizado!","success-msg"); },
            async changeAdminPassword() { if(!this.adminNewPassword||this.adminNewPassword!==this.adminConfirmPassword||this.adminNewPassword.length<4){this.showMsg("Senhas inválidas","error-msg");return;} const admin=this.usuariosSistema.find(u=>u.email===this.currentUser.email); if(admin){admin.password=this.adminNewPassword;this.currentUser.password=this.adminNewPassword;await this.afterUpdate();this.showMsg("Senha atualizada!","success-msg");this.adminNewPassword="";this.adminConfirmPassword="";} },
            async verificarECriarConta() {
                const email = this.criarEmail.trim();

                if(!userExists){
                    this.loginMessage="❌ E-mail não autorizado. Solicite acesso à administradora.";
                    this.loginMessageType="warning-msg";
                    return;

                    this.loginMessage="✅ Este e-mail já possui cadastro! Faça login diretamente.";

                    this.modoCriarConta = false;

                this.pendingEmail = email;

            async doLogin() {

                const user=this.usuariosSistema.find(u=>u.email.toLowerCase()===email.toLowerCase());
                if(user&&!user.password){this.pendingEmail=email;this.showSetupModal=true;this.loginPassword="";return;}
                if(user&&user.password===pwd&&user.canLogin){this.currentUser=user;this.loginEmail="";this.loginPassword="";this.showMsg("Bem-vindo(a)!","success-msg");}
                else{this.loginMessage="Credenciais inválidas";this.loginMessageType="error-msg";}
            },
            logout() { this.currentUser=null; this.activeTab="escala"; this.modoCriarConta=false; this.loginEmail=""; this.loginPassword=""; },
            async finalizarSetup() { 
                if(!this.setupPwd||this.setupPwd.length<4||this.setupPwd!==this.setupConfirm){ this.showMsg("Senha inválida (mínimo 4)","error-msg"); return; }
                const user=this.usuariosSistema.find(u=>u.email===this.pendingEmail);
                if(user){ user.password=this.setupPwd; this.currentUser=user; await this.afterUpdate(); this.showSetupModal=false; this.setupPwd=""; this.setupConfirm=""; this.showMsg("Senha criada! Bem-vindo(a).","success-msg"); }
            },
            cancelarSetup() { this.showSetupModal=false; this.setupPwd=""; this.setupConfirm=""; }
        },
        async mounted() {
            const savedTheme=localStorage.getItem('theme'); 
            if(savedTheme==='dark') this.setDarkMode(); 
            else this.setLightMode();
            await this.carregarTudo();
        },
        watch: {
            membros: { deep: true, handler() { this.afterUpdate(); } },
            musicas: { deep: true, handler() { this.afterUpdate(); } },
            eventos: { deep: true, handler() { this.afterUpdate(); } },
            escalaData: { deep: true, handler() { this.afterUpdate(); } },
            usuariosSistema: { deep: true, handler() { this.afterUpdate(); } }
        }
    });
</script>
</body>
</html>

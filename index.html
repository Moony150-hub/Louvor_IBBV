            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        body.light-mode h2, body.light-mode h3 {
            color: #1a2a3e;
            border-left-color: #FF9800;
        }
        body.light-mode .sub, body.light-mode label {
            color: #5D4037;
        }
        body.light-mode input, body.light-mode select, body.light-mode textarea {
            background: #FFFFFF;
            border: 1.5px solid #FFDEB3;
            color: #2c2418;
        }
        body.light-mode input:focus, body.light-mode select:focus {
            border-color: #FF9800;
            box-shadow: 0 0 0 3px rgba(255, 152, 0, 0.15);
        }
        body.light-mode button {
            background: #FF9800;
            color: #1a1a1a;
        }
        body.light-mode button:hover {
            background: #FFB74D;
        }
        body.light-mode .tab {
            background: #FFF3E0;
            color: #5D4037;
        }
        body.light-mode .tab.active {
            background: #FF9800;
            color: white;
        }
        body.light-mode .card {
            background: #FFFFFF;
            border: 1px solid #FFE4B5;
        }
        body.light-mode .badge, body.light-mode .tom-badge {
            background: #FFF0DF;
            color: #BF5B00;
        }
        body.light-mode .calendar-day {
            background: white;
            border: 1px solid #FFE4B5;
        }
        body.light-mode .calendar-day.has-scale {
            background: #FFF8E7;
            border: 2px solid #FF9800;
        }
        body.light-mode .delete-btn {
            background: #FF5722;
            color: white;
        }
        body.light-mode .delete-btn:hover {
            background: #E64A19;
        }
        body.light-mode .member-option {
            background: #FFFFFF;
            border: 1px solid #FFE4B5;
        }
        body.light-mode .member-option:hover {
            background: #FFF3E0;
        }
        body.light-mode .member-option.selected {
            background: #FFE0B2;
            border-color: #FF9800;
        }

        body.dark-mode {
            background: linear-gradient(135deg, #0d1f3c 0%, #07152b 100%);

            border-left-color: #FFB74D;
        }
        body.dark-mode .sub, body.dark-mode label {
            color: #FFE0B2;
        }
        body.dark-mode input, body.dark-mode select, body.dark-mode textarea {

            color: #FFF8E1;

        }
        body.dark-mode input:focus, body.dark-mode select:focus {

        body.dark-mode button {
            background: #FF9800;
            color: #0d1f3c;
            font-weight: 600;
        }
        body.dark-mode button:hover {
            background: #FFC107;
            color: #07152b;
        }
        body.dark-mode .tab {
            background: #1e3a5f;
            color: #FFE0B2;
        }
        body.dark-mode .tab.active {
            background: #FF9800;
            color: #0d1f3c;
        }
        body.dark-mode .card {

        }
        body.dark-mode .badge, body.dark-mode .tom-badge {

            color: #0d1f3c;

        }

            color: #FFE0B2;
        }
        body.dark-mode .calendar-day.has-scale {
            background: #2a4a74;
            border: 2px solid #FFC107;
        }
        body.dark-mode .day-number {
            color: #FFE082;
        }
        body.dark-mode .scale-member {
            background: rgba(255, 152, 0, 0.25);

        }
        body.dark-mode .delete-btn {
            background: #FF5722;
            color: white;
        }
        body.dark-mode .delete-btn:hover {
            background: #F44336;
        }
        body.dark-mode .member-option {
            background: #1e3a5f;
            border: 1px solid #FFB74D;
            color: #FFE0B2;
        }
        body.dark-mode .member-option:hover {
            background: #2a4a74;
        }
        body.dark-mode .member-option.selected {

        }

        }

        }

        }

        /* ESTILOS GLOBAIS */
        .glass-card {
            border-radius: 28px;
            padding: 1.8rem;
            transition: all 0.2s;
        }
        .container {
            max-width: 1300px;
            width: 100%;
            margin: 0 auto;
            padding: 1rem;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }
        h2 {
            font-size: 1.35rem;
            font-weight: 600;
            margin: 1.5rem 0 1rem 0;
            padding-left: 1rem;
            border-left-width: 4px;
            border-left-style: solid;
        }
        h3 {
            font-size: 1rem;
            font-weight: 600;
            margin: 1rem 0 0.75rem 0;
            padding-left: 0.75rem;
            border-left-width: 3px;
            border-left-style: solid;
        }
        .sub {
            margin-bottom: 1.5rem;
            font-weight: 500;
            font-size: 0.9rem;
            opacity: 0.8;
        }
        .input-group {
            margin-bottom: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }
        label {
            font-weight: 600;
            font-size: 0.8rem;
            letter-spacing: 0.3px;
        }
        input, select, textarea {
            padding: 0.8rem 1rem;
            border-radius: 18px;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.2s;
            font-weight: 500;
        }
        button {
            border: none;
            padding: 0.7rem 1.3rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        button:hover {
            transform: translateY(-2px);
        }
        .tabs {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 1.8rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid rgba(255, 152, 0, 0.3);
        }
        .tab {
            padding: 0.55rem 1.2rem;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        .tab:hover {
            transform: translateY(-2px);
            opacity: 0.85;
        }
        .card {
            padding: 1rem;
            border-radius: 20px;
            margin-bottom: 0.8rem;
            transition: all 0.2s;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1rem;
        }
        .message-area {
            margin: 1rem 0;
            padding: 0.8rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            text-align: center;
            font-weight: 500;
        }
        .error-msg {
            border-left-width: 4px;
            border-left-style: solid;
        }
        .success-msg {
            border-left-width: 4px;
            border-left-style: solid;
        }
        .small-btn {
            padding: 0.3rem 0.8rem;
            font-size: 0.7rem;
        }
        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .tom-badge, .badge {
            display: inline-block;
            padding: 0.2rem 0.7rem;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
            margin: 0.2rem 0.2rem;
        }
        .music-link {
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }
        .music-link:hover {
            text-decoration: underline;
        }

        /* CALENDÁRIO */
        .calendar-header {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-weight: 700;
            font-size: 0.8rem;
            margin-bottom: 0.5rem;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 0.5rem;
        }
        .calendar-day {
            min-height: 95px;
            padding: 0.5rem;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .calendar-day:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 14px rgba(0,0,0,0.15);
        }
        .calendar-day.empty {
            opacity: 0.4;
            cursor: default;
        }
        .day-number {
            font-weight: 700;
            font-size: 0.9rem;
            margin-bottom: 0.4rem;
        }
        .scale-members {
            font-size: 0.65rem;
            max-height: 65px;
            overflow-y: auto;
        }
        .scale-member {
            border-radius: 12px;
            padding: 0.15rem 0.3rem;
            margin: 0.15rem 0;
            font-size: 0.6rem;
            font-weight: 500;
        }
        .month-selector {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            max-width: 500px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            border-radius: 28px;
        }
        .member-select-list {
            max-height: 300px;
            overflow-y: auto;
        }
        .member-option {
            padding: 0.7rem;
            margin: 0.4rem 0;
            border-radius: 16px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.15s;
        }
        .two-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }
        .cloud-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.7rem;
            padding: 0.3rem 0.8rem;
            border-radius: 40px;
        }
        .cantor-nome {
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        .admin-section {
            padding: 1rem;
            border-radius: 20px;
            margin-bottom: 1rem;
        }
        @media (max-width: 750px) {
            .container {
                padding: 0.5rem;
            }
            .glass-card {
                padding: 1.2rem;
            }
            .two-columns {
                grid-template-columns: 1fr;
            }
            .calendar-day {
                min-height: 70px;
                font-size: 0.7rem;
            }
            h1 {
                font-size: 1.4rem;
            }
            .tab {
                padding: 0.4rem 0.9rem;
                font-size: 0.75rem;
            }
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .syncing {
            animation: pulse 1s infinite;
        }
        footer {
            text-align: center;
            font-size: 0.7rem;
            margin-top: 2rem;
            opacity: 0.7;
        }
        hr {
            margin: 1rem 0;
        }
    </style>
</head>

                                    <template v-if="dia">
                                        <div class="day-number">{{ dia.getDate() }}</div>
                                        <div class="scale-members">
                                            <div v-for="m in (escalaData[formatDateKey(dia)] || [])" :key="m.id" class="scale-member">{{ m.nome }}</div>
                                        </div>
                                    </template>
                                </div>
                            </div>
                            <div class="message-area" style="margin-top:1rem;">💡 Clique em qualquer dia para adicionar ou remover membros da escala</div>
                        </div>

                        <!-- MÚSICAS -->
                        <div v-if="activeTab === 'musicas'">
                            <div class="flex-between"><h2>🎵 Repertório de Músicas</h2><button @click="mostrarFormMusica = !mostrarFormMusica" class="small-btn">{{ mostrarFormMusica ? 'Fechar' : '+ Nova Música' }}</button></div>
                            <div v-if="mostrarFormMusica" style="margin-bottom:1rem; padding:1rem; border-radius:20px; background:rgba(255,152,0,0.12);">
                                <div class="input-group"><label>Nome da Música</label><input v-model="novaMusica.nome" placeholder="Ex: Grandes Coisas"></div>
                                <div class="input-group"><label>Link da Cifra</label><input v-model="novaMusica.link" placeholder="https://www.cifraclub.com.br/..."></div>
                                <div class="input-group"><label>Tom Original</label><select v-model="novaMusica.tomOriginal"><option value="">Selecione</option><option v-for="t in tons" :key="t">{{ t }}</option></select></div>
                                <div class="input-group"><label>Adicionar Cantor e Tom (opcional)</label>
                                    <div style="display:flex; gap:8px; flex-wrap:wrap;">
                                        <select v-model="novoTomCantor.cantor" style="flex:1;"><option value="">Selecione um cantor</option><option v-for="c in cantoresLista" :key="c.nome" :value="c.nome">{{ c.nome }}</option></select>
                                        <select v-model="novoTomCantor.tom" style="width:100px;"><option value="">Tom</option><option v-for="t in tons" :key="t">{{ t }}</option></select>
                                        <button @click="adicionarTomCantor" class="small-btn">+ Adicionar</button>
                                    </div>
                                </div>
                                <div v-if="novaMusica.tonsCantoresTemp && novaMusica.tonsCantoresTemp.length > 0">
                                    <label>Cantores adicionados:</label>
                                    <div><span v-for="(tc, idx) in novaMusica.tonsCantoresTemp" :key="idx" class="tom-badge">{{ tc.cantor }}: {{ tc.tom }} <button @click="removerTomCantorTemp(idx)" style="background:transparent; padding:0 5px;">✖</button></span></div>
                                </div>
                                <button @click="salvarMusica" style="margin-top:1rem;">💾 Salvar Música</button>
                            </div>
                            <div class="two-columns">
                                <div><h3>📋 Todas as Músicas (Tons Originais)</h3><div v-for="m in musicas" :key="m.id" class="card"><div class="flex-between"><a :href="m.link" target="_blank" class="music-link">🎵 {{ m.nome }}</a><button @click="removerMusica(m.id)" class="small-btn delete-btn">🗑️</button></div><span class="tom-badge">Tom Original: {{ m.tomOriginal || '-' }}</span><div v-if="m.tonsCantores && m.tonsCantores.length"><strong>Cantores:</strong> <span v-for="tc in m.tonsCantores" :key="tc.cantor" class="tom-badge">{{ tc.cantor }} ({{ tc.tom }})</span></div></div><div v-if="!musicas.length" class="message-area">Nenhuma música cadastrada</div></div>
                                <div><h3>🎤 Cantores e Suas Músicas</h3><div v-for="c in cantoresComMusicas" :key="c.nome" class="card"><div class="cantor-nome">🎙️ {{ c.nome }}</div><div v-for="mus in c.musicas" :key="mus.musicaId" style="margin:5px 0;"><a :href="mus.link" target="_blank" class="music-link">{{ mus.nome }}</a> <span class="tom-badge">{{ mus.tom }}</span></div><div v-if="!c.musicas.length" style="font-size:0.8rem;">Nenhuma música associada</div></div></div>
                            </div>
                        </div>

                        <!-- EVENTOS -->
                        <div v-if="activeTab === 'eventos'">
                            <h2>📆 Eventos e Ministração</h2>
                            <div class="grid-2">
                                <div><div class="input-group"><label>Nome do Evento</label><input v-model="novoEvento.nome" placeholder="Ex: Culto de Natal"></div><div class="input-group"><label>Data (DD/MM/AAAA)</label><input v-model="novoEvento.data" placeholder="25/12/2024"></div><div class="input-group"><label>Horário</label><input v-model="novoEvento.horario" placeholder="19:00"></div><div class="input-group"><label>Responsáveis</label><input v-model="novoEvento.responsaveis" placeholder="Ana Silva, Carlos Souza"></div><button @click="adicionarEvento">📌 Adicionar Evento</button></div>
                                <div><h3>Próximos Eventos</h3><div v-for="(ev, idx) in eventos" :key="idx" class="card"><div class="flex-between"><strong>🎪 {{ ev.nome }}</strong><button @click="removerEvento(idx)" class="small-btn delete-btn">✖</button></div><div>📅 {{ ev.data }} às {{ ev.horario }}</div><div>🎸 Responsáveis: {{ ev.responsaveis || '-' }}</div></div><div v-if="!eventos.length" class="message-area">Nenhum evento cadastrado</div></div>
                            </div>
                        </div>

                        <!-- MEMBROS -->
                        <div v-if="activeTab === 'membros'">
                            <div class="flex-between"><h2>👥 Membros do Ministério</h2><button @click="mostrarFormMembro = !mostrarFormMembro" class="small-btn">{{ mostrarFormMembro ? 'Fechar' : '+ Novo Membro' }}</button></div>
                            <div v-if="mostrarFormMembro" style="margin-bottom:1rem; padding:1rem; border-radius:20px; background:rgba(255,152,0,0.12);"><div class="input-group"><label>Nome Completo</label><input v-model="novoMembro.nome"></div><div class="input-group"><label>E-mail</label><input v-model="novoMembro.email"></div><div class="input-group"><label>Função</label><select v-model="novoMembro.funcao"><option value="canta">🎤 Apenas Canta</option><option value="toca">🎸 Apenas Toca</option><option value="ambos">🎤🎸 Ambos (Canta e Toca)</option></select></div><div v-if="novoMembro.funcao === 'toca' || novoMembro.funcao === 'ambos'"><label>Instrumentos</label><div style="display:flex; flex-wrap:wrap; gap:8px;"><label v-for="inst in instrumentos" :key="inst" style="display:flex; align-items:center; gap:4px;"><input type="checkbox" :value="inst" v-model="novoMembro.instrumentosSelecionados"> {{ inst }}</label></div></div><button @click="salvarMembro">💾 Salvar Membro</button></div>
                            <div class="grid-2"><div v-for="m in membros" :key="m.id" class="card"><div class="flex-between"><span><strong>{{ m.nome }}</strong></span><button @click="removerMembro(m.id)" class="small-btn delete-btn">🗑️</button></div><div>{{ m.email }}</div><div><span class="badge">{{ m.funcao === 'canta' ? '🎤 Cantor(a)' : (m.funcao === 'toca' ? '🎸 Músico' : '🎤🎸 Ambos') }}</span></div><div><span v-for="inst in m.instrumentos" :key="inst" class="tom-badge">{{ inst }}</span></div></div></div>
                        </div>

                        <!-- ADMIN -->
                        <div v-if="activeTab === 'admin' && currentUser.isAdmin">
                            <div class="admin-section"><h2>👥 Gerenciar Acessos ao Sistema</h2><p style="margin-bottom:1rem;">Adicione ou remova usuários que podem fazer login.</p><div class="input-group"><label>E-mail do novo usuário</label><input v-model="novoUsuarioEmail" placeholder="novo@igreja.com"></div><button @click="adicionarUsuarioSistema">➕ Adicionar Usuário</button><h3 style="margin-top:1rem;">Usuários cadastrados</h3><div v-for="user in usuariosSistema" :key="user.email" class="card"><div class="flex-between"><div><strong>{{ user.email }}</strong> <span v-if="user.isAdmin" class="badge">Admin</span> <span v-if="!user.password" class="tom-badge">🔑 Sem senha</span><span v-else class="tom-badge">✅ Senha definida</span></div><button v-if="!user.isAdmin" @click="removerUsuarioSistema(user.email)" class="small-btn delete-btn">Remover</button></div></div></div>
                            <hr><div class="admin-section"><h2>🔐 Alterar minha senha</h2><div class="input-group"><label>Nova senha (mínimo 4 caracteres)</label><input type="password" v-model="adminNewPassword"></div><div class="input-group"><label>Confirmar</label><input type="password" v-model="adminConfirmPassword"></div><button @click="changeAdminPassword">Atualizar minha senha</button></div>
                        </div>
                        <footer>☁️ Dados sincronizados na nuvem | Todos compartilham as mesmas informações</footer>
                    </div>
                </div>

                <!-- MODAL ESCALA -->
                <div v-if="modalEscalaVisible" class="modal-overlay" @click.self="fecharModalEscala">
                    <div class="glass-card modal-content"><div class="flex-between"><h2>📅 Escala para {{ diaSelecionado ? diaSelecionado.getDate() + '/' + (diaSelecionado.getMonth()+1) + '/' + diaSelecionado.getFullYear() : '' }}</h2><button @click="fecharModalEscala" class="small-btn">✖</button></div><h3>Selecione os membros que vão ministrar neste dia:</h3><div class="member-select-list"><div v-for="m in membros" :key="m.id" :class="['member-option', { selected: membroSelecionado(m.id) }]" @click="toggleMembroEscala(m.id)"><span><strong>{{ m.nome }}</strong> - {{ m.funcao === 'canta' ? '🎤 Cantor' : (m.funcao === 'toca' ? '🎸 Músico' : '🎤🎸 Ambos') }}</span><span v-if="membroSelecionado(m.id)" class="tom-badge">✓ Selecionado</span></div></div><div style="display:flex; gap:0.8rem; margin-top:1rem;"><button @click="salvarEscalaDia">💾 Salvar Escala</button><button @click="limparEscalaDia" class="small-btn delete-btn">Limpar Dia</button></div></div>
                </div>

                <!-- MODAL CRIAR SENHA -->
                <div v-if="showSetupModal" class="modal-overlay" @click.self="cancelarSetup"><div class="glass-card" style="max-width:400px;"><h2>✨ Criar sua senha de acesso</h2><p>Olá <strong>{{ pendingEmail }}</strong>, defina sua senha para acessar o sistema.</p><div class="input-group"><label>Senha (mínimo 4 caracteres)</label><input type="password" v-model="setupPwd"></div><div class="input-group"><label>Confirmar senha</label><input type="password" v-model="setupConfirm"></div><button @click="finalizarSetup">Salvar e Entrar</button><button @click="cancelarSetup" class="small-btn delete-btn" style="margin-top:8px;">Cancelar</button></div></div>
            </div>
        `,
        data() {
            return {
                currentUser: null, loginEmail: "", loginPassword: "", loginMessage: "", loginMessageType: "",
                globalMessage: "", globalMsgType: "", activeTab: "escala", syncActive: false,
                ano: new Date().getFullYear(), mes: new Date().getMonth(), escalaData: {},
                modalEscalaVisible: false, diaSelecionado: null, membrosSelecionadosTemp: [],
                musicas: [], novaMusica: { nome: "", link: "", tomOriginal: "", tonsCantoresTemp: [] }, novoTomCantor: { cantor: "", tom: "" }, mostrarFormMusica: false, tons: TONS,
                eventos: [], novoEvento: { nome: "", data: "", horario: "", responsaveis: "" },
                membros: [], novoMembro: { nome: "", email: "", funcao: "canta", instrumentosSelecionados: [] }, mostrarFormMembro: false, instrumentos: INSTRUMENTOS,
                usuariosSistema: [], novoUsuarioEmail: "", adminNewPassword: "", adminConfirmPassword: "",
                showSetupModal: false, pendingEmail: "", setupPwd: "", setupConfirm: ""
            }
        },
        computed: {
            nomeMes() { return ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"][this.mes]; },
            diasCalendario() {
                const primeiro = new Date(this.ano, this.mes, 1), ultimo = new Date(this.ano, this.mes+1, 0), dias = [];
                for(let i=0; i<primeiro.getDay(); i++) dias.push(null);
                for(let i=1; i<=ultimo.getDate(); i++) dias.push(new Date(this.ano, this.mes, i));
                return dias;
            },
            cantoresLista() { return this.membros.filter(m => m.funcao === 'canta' || m.funcao === 'ambos'); },
            cantoresComMusicas() {
                return this.cantoresLista.map(cantor => ({
                    nome: cantor.nome,
                    musicas: this.musicas.filter(m => m.tonsCantores?.some(t => t.cantor === cantor.nome)).map(m => ({ musicaId: m.id, nome: m.nome, link: m.link, tom: m.tonsCantores?.find(t=>t.cantor===cantor.nome)?.tom || '-' }))
                }));
            }
        },
        methods: {
            formatDateKey(d) { return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`; },
            async syncToCloud() {
                if (this.syncActive) return;
                this.syncActive = true;
                const dados = { 
                    [CLOUD_KEYS.membros]: this.membros, 
                    [CLOUD_KEYS.musicas]: this.musicas, 
                    [CLOUD_KEYS.eventos]: this.eventos, 
                    [CLOUD_KEYS.escala]: this.escalaData, 
                    [CLOUD_KEYS.usuarios]: this.usuariosSistema 
                };
                const ok = await salvarNaNuvem(dados);
                if (ok) this.showMsg("✅ Sincronizado com a nuvem", "success-msg");
                else this.showMsg("⚠️ Erro na sincronização", "error-msg");
                this.syncActive = false;
            },
            async carregarTudo() {
                this.syncActive = true;
                const dadosNuvem = await carregarDaNuvem();
                if (dadosNuvem && dadosNuvem[CLOUD_KEYS.membros]?.length) {
                    this.membros = dadosNuvem[CLOUD_KEYS.membros];
                    this.musicas = dadosNuvem[CLOUD_KEYS.musicas];
                    this.eventos = dadosNuvem[CLOUD_KEYS.eventos];
                    this.escalaData = dadosNuvem[CLOUD_KEYS.escala] || {};
                    this.usuariosSistema = dadosNuvem[CLOUD_KEYS.usuarios];
                } else {
                    this.membros = getDefaultMembros();
                    this.musicas = getDefaultMusicas();
                    this.eventos = [];
                    this.escalaData = {};
                    this.usuariosSistema = getDefaultUsuarios();
                    await this.syncToCloud();
                }
                this.syncActive = false;
            },
            async afterUpdate() { await this.syncToCloud(); },
            setLightMode() { document.body.classList.add('light-mode'); document.body.classList.remove('dark-mode'); localStorage.setItem('theme', 'light'); },
            setDarkMode() { document.body.classList.add('dark-mode'); document.body.classList.remove('light-mode'); localStorage.setItem('theme', 'dark'); },
            showMsg(msg, type) { this.globalMessage = msg; this.globalMsgType = type; setTimeout(() => this.globalMessage = "", 3000); },
            mesAnterior() { if(this.mes===0){this.mes=11;this.ano--}else{this.mes--} },
            proximoMes() { if(this.mes===11){this.mes=0;this.ano++}else{this.mes++} },
            mesAtual() { this.ano=new Date().getFullYear(); this.mes=new Date().getMonth(); },
            abrirModalEscala(dia) { this.diaSelecionado=dia; const chave=this.formatDateKey(dia); this.membrosSelecionadosTemp=(this.escalaData[chave]||[]).map(m=>m.id); this.modalEscalaVisible=true; },
            fecharModalEscala() { this.modalEscalaVisible=false; this.diaSelecionado=null; },
            membroSelecionado(id) { return this.membrosSelecionadosTemp.includes(id); },
            toggleMembroEscala(id) { const idx=this.membrosSelecionadosTemp.indexOf(id); idx===-1?this.membrosSelecionadosTemp.push(id):this.membrosSelecionadosTemp.splice(idx,1); },
            async salvarEscalaDia() { const chave=this.formatDateKey(this.diaSelecionado); this.escalaData[chave]=this.membros.filter(m=>this.membrosSelecionadosTemp.includes(m.id)); this.fecharModalEscala(); await this.afterUpdate(); this.showMsg("Escala salva","success-msg"); },
            async limparEscalaDia() { delete this.escalaData[this.formatDateKey(this.diaSelecionado)]; this.fecharModalEscala(); await this.afterUpdate(); this.showMsg("Dia limpo","success-msg"); },
            adicionarTomCantor() { if(!this.novoTomCantor.cantor||!this.novoTomCantor.tom){this.showMsg("Selecione cantor e tom","error-msg");return;} this.novaMusica.tonsCantoresTemp.push({cantor:this.novoTomCantor.cantor,tom:this.novoTomCantor.tom}); this.novoTomCantor={cantor:"",tom:""}; },
            removerTomCantorTemp(idx) { this.novaMusica.tonsCantoresTemp.splice(idx,1); },
            async salvarMusica() { if(!this.novaMusica.nome||!this.novaMusica.link){this.showMsg("Preencha nome e link","error-msg");return;} this.musicas.push({id:Date.now(),nome:this.novaMusica.nome,link:this.novaMusica.link,tomOriginal:this.novaMusica.tomOriginal,tonsCantores:[...this.novaMusica.tonsCantoresTemp]}); this.novaMusica={nome:"",link:"",tomOriginal:"",tonsCantoresTemp:[]}; this.mostrarFormMusica=false; await this.afterUpdate(); this.showMsg("Música adicionada","success-msg"); },
            async removerMusica(id) { if(confirm("Remover esta música?")){this.musicas=this.musicas.filter(m=>m.id!==id); await this.afterUpdate();} },
            async adicionarEvento() { if(!this.novoEvento.nome||!this.novoEvento.data){this.showMsg("Preencha nome e data","error-msg");return;} this.eventos.push({...this.novoEvento}); this.novoEvento={nome:"",data:"",horario:"",responsaveis:""}; await this.afterUpdate(); this.showMsg("Evento adicionado","success-msg"); },
            async removerEvento(idx) { this.eventos.splice(idx,1); await this.afterUpdate(); },
            async salvarMembro() { if(!this.novoMembro.nome||!this.novoMembro.email){this.showMsg("Nome e e-mail obrigatórios","error-msg");return;} this.membros.push({id:Date.now(),nome:this.novoMembro.nome,email:this.novoMembro.email,funcao:this.novoMembro.funcao,instrumentos:[...this.novoMembro.instrumentosSelecionados]}); this.novoMembro={nome:"",email:"",funcao:"canta",instrumentosSelecionados:[]}; this.mostrarFormMembro=false; await this.afterUpdate(); this.showMsg("Membro adicionado","success-msg"); },
            async removerMembro(id) { if(confirm("Remover este membro?")){this.membros=this.membros.filter(m=>m.id!==id); await this.afterUpdate();} },
            async adicionarUsuarioSistema() { if(!this.novoUsuarioEmail.trim()){this.showMsg("Digite um e-mail","error-msg");return;} if(this.usuariosSistema.find(u=>u.email===this.novoUsuarioEmail)){this.showMsg("E-mail já cadastrado","error-msg");return;} this.usuariosSistema.push({email:this.novoUsuarioEmail,password:"",isAdmin:false,canLogin:true}); this.novoUsuarioEmail=""; await this.afterUpdate(); this.showMsg("Usuário adicionado","success-msg"); },
            async removerUsuarioSistema(email) { if(confirm(`Remover acesso de ${email}?`)){this.usuariosSistema=this.usuariosSistema.filter(u=>u.email!==email); await this.afterUpdate();} },
            async changeAdminPassword() { if(!this.adminNewPassword||this.adminNewPassword!==this.adminConfirmPassword||this.adminNewPassword.length<4){this.showMsg("Senhas não coincidem ou são curtas","error-msg");return;} const admin=this.usuariosSistema.find(u=>u.email===this.currentUser.email); if(admin){admin.password=this.adminNewPassword;this.currentUser.password=this.adminNewPassword;await this.afterUpdate();this.showMsg("Senha atualizada!","success-msg");this.adminNewPassword="";this.adminConfirmPassword="";} },
            async doLogin() {
                const email=this.loginEmail.trim(), pwd=this.loginPassword;
                if(!email||!pwd){this.loginMessage="Preencha e-mail e senha";this.loginMessageType="error-msg";return;}
                const user=this.usuariosSistema.find(u=>u.email.toLowerCase()===email.toLowerCase());
                if(user&&!user.password){this.pendingEmail=email;this.showSetupModal=true;this.loginPassword="";return;}
                if(user&&user.password===pwd&&user.canLogin){this.currentUser=user;this.loginEmail="";this.loginPassword="";this.showMsg("Bem-vindo(a) ao sistema!","success-msg");}
                else{this.loginMessage="Credenciais inválidas";this.loginMessageType="error-msg";}
            },
            logout() { this.currentUser=null; this.activeTab="escala"; },
            async finalizarSetup() { if(!this.setupPwd||this.setupPwd.length<4||this.setupPwd!==this.setupConfirm){this.showMsg("Senha inválida ou não coincidem","error-msg");return;} const user=this.usuariosSistema.find(u=>u.email===this.pendingEmail); if(user){user.password=this.setupPwd;this.currentUser=user;await this.afterUpdate();this.showSetupModal=false;this.showMsg("Senha criada! Bem-vindo(a).","success-msg");} },
            cancelarSetup() { this.showSetupModal=false; }
        },
        async mounted() {
            const savedTheme=localStorage.getItem('theme'); 
            if(savedTheme==='dark') this.setDarkMode(); 
            else this.setLightMode();
            await this.carregarTudo();
        },
        watch: {
            membros: { deep: true, handler() { this.afterUpdate(); } },
            musicas: { deep: true, handler() { this.afterUpdate(); } },
            eventos: { deep: true, handler() { this.afterUpdate(); } },
            escalaData: { deep: true, handler() { this.afterUpdate(); } },
            usuariosSistema: { deep: true, handler() { this.afterUpdate(); } }
        }
    });
</script>
</body>
</html>

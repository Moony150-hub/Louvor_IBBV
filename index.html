<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Sistema de Louvor | Colaborativo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            transition: background-color 0.3s ease;
            min-height: 100vh;
        }

        .app-wrapper {
            min-height: 100vh;
            width: 100%;
            padding: 16px;
            background: inherit;
        }

        /* MODO CLARO */
        body.light-mode {
            background: linear-gradient(135deg, #f5efe6 0%, #fae8d1 100%);
        }
        body.light-mode .glass-card {
            background: rgba(255, 252, 245, 0.96);
            backdrop-filter: blur(8px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.06);
            border: 1px solid rgba(255, 193, 7, 0.25);
        }
        body.light-mode h1 {
            background: linear-gradient(135deg, #0B1A33, #FF9800);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        body.light-mode h2, body.light-mode h3 {
            color: #1a2a3e;
            border-left-color: #FF9800;
        }
        body.light-mode .sub, body.light-mode label {
            color: #5D4037;
        }
        body.light-mode input, body.light-mode select, body.light-mode textarea {
            background: #FFFFFF;
            border: 1.5px solid #FFDEB3;
            color: #2c2418;
        }
        body.light-mode button {
            background: #FF9800;
            color: #1a1a1a;
        }
        body.light-mode button:hover {
            background: #FFB74D;
        }
        body.light-mode .tab {
            background: #FFF3E0;
            color: #5D4037;
        }
        body.light-mode .tab.active {
            background: #FF9800;
            color: white;
        }
        body.light-mode .card {
            background: #FFFFFF;
            border: 1px solid #FFE4B5;
        }
        body.light-mode .badge, body.light-mode .tom-badge {
            background: #FFF0DF;
            color: #BF5B00;
        }
        body.light-mode .calendar-day {
            background: white;
            border: 1px solid #FFE4B5;
        }
        body.light-mode .calendar-day.has-scale, body.light-mode .calendar-day.has-event {
            background: #FFF8E7;
            border: 2px solid #FF9800;
        }
        body.light-mode .delete-btn {
            background: #FF5722;
            color: white;
        }
        body.light-mode .edit-btn {
            background: #2196F3;
            color: white;
        }
        body.light-mode .edit-btn:hover {
            background: #1976D2;
        }
        body.light-mode .repertorio-item {
            background: #FFF8E7;
            border-left: 4px solid #FF9800;
        }
        body.light-mode .music-link {
            color: #FF9800;
        }
        body.light-mode .music-link:hover {
            color: #E65100;
        }
        body.light-mode .warning-message {
            background: linear-gradient(135deg, #FFF8E1, #FFF3E0);
            border: 1px solid #FFD54F;
            color: #E65100;
        }

        /* MODO ESCURO */
        body.dark-mode {
            background: linear-gradient(135deg, #0d1f3c 0%, #07152b 100%);
        }
        body.dark-mode .glass-card {
            background: rgba(13, 31, 60, 0.96);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 193, 7, 0.4);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }
        body.dark-mode h1 {
            background: linear-gradient(135deg, #FFE082, #FFB74D);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        body.dark-mode h2, body.dark-mode h3 {
            color: #FFE082;
            border-left-color: #FFB74D;
        }
        body.dark-mode .sub, body.dark-mode label {
            color: #FFDEB3;
        }
        body.dark-mode p, body.dark-mode span, body.dark-mode div, body.dark-mode strong {
            color: #FFEFD5;
        }
        body.dark-mode input, body.dark-mode select, body.dark-mode textarea {
            background: #1e3a5f;
            border: 1.5px solid #FFB74D;
            color: #FFF8E1;
        }
        body.dark-mode button {
            background: #FF9800;
            color: #0d1f3c;
            font-weight: 700;
        }
        body.dark-mode button:hover {
            background: #FFC107;
        }
        body.dark-mode .tab {
            background: #1e3a5f;
            color: #FFE0B2;
        }
        body.dark-mode .tab.active {
            background: #FF9800;
            color: #0d1f3c;
        }
        body.dark-mode .card {
            background: #1e3a5f;
            border: 1px solid #FFB74D;
        }
        body.dark-mode .badge, body.dark-mode .tom-badge {
            background: #FFB74D;
            color: #0d1f3c;
        }
        body.dark-mode .calendar-day {
            background: #1e3a5f;
            border: 1px solid #FFB74D;
        }
        body.dark-mode .calendar-day .day-number {
            color: #FFE082;
        }
        body.dark-mode .calendar-day.has-scale, body.dark-mode .calendar-day.has-event {
            background: #2a4a74;
            border: 2px solid #FFC107;
        }
        body.dark-mode .delete-btn {
            background: #FF5722;
            color: white;
        }
        body.dark-mode .edit-btn {
            background: #2196F3;
            color: white;
        }
        body.dark-mode .edit-btn:hover {
            background: #1976D2;
        }
        body.dark-mode .repertorio-item {
            background: #1a3a5a;
            border-left: 4px solid #FFC107;
        }
        body.dark-mode .music-link {
            color: #FFC107;
        }
        body.dark-mode .music-link:hover {
            color: #FFE082;
        }
        body.dark-mode .warning-message {
            background: linear-gradient(135deg, #1a3a5a, #1a2a4a);
            border: 1px solid #FFB74D;
            color: #FFE082;
        }

        /* ESTILOS GLOBAIS */
        .glass-card {
            border-radius: 28px;
            padding: 1.5rem;
            transition: all 0.2s;
            width: 100%;
        }
        .container {
            max-width: 1600px;
            width: 100%;
            margin: 0 auto;
        }
        .login-container {
            max-width: 450px;
            width: 100%;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            text-align: center;
        }
        h2 {
            font-size: 1.3rem;
            font-weight: 600;
            margin: 1rem 0 0.8rem 0;
            padding-left: 0.8rem;
            border-left-width: 4px;
            border-left-style: solid;
        }
        h3 {
            font-size: 1rem;
            font-weight: 600;
            margin: 0.8rem 0 0.5rem 0;
            padding-left: 0.6rem;
            border-left-width: 3px;
            border-left-style: solid;
        }
        .sub {
            margin-bottom: 1.2rem;
            font-weight: 500;
            font-size: 0.9rem;
            text-align: center;
            opacity: 0.8;
        }
        .input-group {
            margin-bottom: 0.8rem;
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }
        label {
            font-weight: 600;
            font-size: 0.8rem;
            letter-spacing: 0.3px;
        }
        input, select, textarea {
            padding: 0.7rem 1rem;
            border-radius: 16px;
            font-size: 0.85rem;
            outline: none;
            transition: all 0.2s;
            font-weight: 500;
            width: 100%;
        }
        button {
            border: none;
            padding: 0.65rem 1.2rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }
        button:hover {
            transform: translateY(-2px);
        }
        .btn-full {
            width: 100%;
        }
        .tabs {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid rgba(255, 152, 0, 0.3);
        }
        .tab {
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .card {
            padding: 0.8rem;
            border-radius: 18px;
            margin-bottom: 0.7rem;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 0.8rem;
        }
        .message-area {
            margin: 0.8rem 0;
            padding: 0.7rem;
            border-radius: 18px;
            font-size: 0.85rem;
            text-align: center;
            font-weight: 500;
        }
        .small-btn {
            padding: 0.3rem 0.8rem;
            font-size: 0.7rem;
        }
        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .tom-badge, .badge {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
            margin: 0.15rem 0.15rem;
            white-space: nowrap;
        }
        .truncate {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
        }
        .music-link {
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            display: inline-block;
            max-width: 200px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        /* Calendário */
        .calendar-header {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-weight: 700;
            font-size: 0.8rem;
            margin-bottom: 0.5rem;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 0.5rem;
        }
        .calendar-day {
            min-height: 100px;
            padding: 0.5rem;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        .calendar-day:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 14px rgba(0,0,0,0.15);
        }
        .calendar-day.empty {
            opacity: 0.4;
            cursor: default;
        }
        .day-number {
            font-weight: 700;
            font-size: 0.9rem;
            margin-bottom: 0.3rem;
        }
        .scale-members, .event-items {
            font-size: 0.65rem;
            max-height: 65px;
            overflow-y: auto;
        }
        .scale-member {
            border-radius: 10px;
            padding: 0.1rem 0.3rem;
            margin: 0.1rem 0;
            font-size: 0.6rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .month-selector {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }
        
        /* Relógio redondo estilo analógico */
        .time-picker {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            background: rgba(255,152,0,0.12);
            padding: 0.5rem 1rem;
            border-radius: 50px;
            width: fit-content;
        }
        .clock-icon {
            font-size: 1.3rem;
        }
        .time-picker input {
            width: 110px;
            padding: 0.5rem;
            text-align: center;
            font-family: monospace;
            font-size: 1rem;
            font-weight: 600;
            background: transparent;
            border: none;
            outline: none;
        }
        
        /* Modais */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .modal-content {
            max-width: 500px;
            width: 100%;
            border-radius: 28px;
            padding: 1.5rem;
            max-height: 85vh;
            overflow-y: auto;
        }
        .modal-buttons {
            display: flex;
            gap: 0.8rem;
            margin-top: 1.2rem;
            justify-content: flex-end;
        }
        .member-option {
            padding: 0.6rem;
            margin: 0.3rem 0;
            border-radius: 14px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .member-select-list {
            max-height: 280px;
            overflow-y: auto;
        }
        
        /* Checkbox para seleção múltipla */
        .music-select-item {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.6rem;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .music-select-item:hover {
            background: rgba(255,152,0,0.15);
        }
        .music-select-item input {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }
        
        /* Ícone de nuvem com animação */
        .cloud-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            padding: 0.3rem 0.8rem;
            border-radius: 40px;
            transition: all 0.2s;
        }
        .cloud-status.syncing {
            animation: pulse 0.8s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.95); }
        }
        
        .search-box {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.4rem 0.8rem;
            border-radius: 40px;
            margin-bottom: 0.8rem;
        }
        .search-box input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 0.4rem;
        }
        .week-selector {
            display: flex;
            gap: 0.8rem;
            justify-content: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            align-items: center;
        }
        .repertorio-item {
            padding: 0.8rem;
            border-radius: 16px;
            margin-bottom: 0.7rem;
        }
        .admin-section {
            padding: 0.8rem;
            border-radius: 18px;
            margin-bottom: 0.8rem;
        }
        .auth-links {
            display: flex;
            justify-content: center;
            gap: 1.2rem;
            margin-top: 0.8rem;
        }
        .auth-link {
            background: none;
            text-decoration: underline;
            cursor: pointer;
            font-size: 0.8rem;
            padding: 0;
        }
        footer {
            text-align: center;
            font-size: 0.7rem;
            margin-top: 1.5rem;
            opacity: 0.7;
        }
        hr {
            margin: 0.8rem 0;
        }
        .warning-message {
            padding: 1rem;
            border-radius: 20px;
            text-align: center;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            font-weight: 500;
            line-height: 1.4;
        }
        
        @media (max-width: 768px) {
            .app-wrapper { padding: 8px; }
            .glass-card { padding: 1rem; }
            h1 { font-size: 1.3rem; }
            h2 { font-size: 1.1rem; }
            .tab { padding: 0.35rem 0.8rem; font-size: 0.7rem; }
            .music-link { max-width: 150px; }
            .calendar-day { min-height: 70px; font-size: 0.7rem; }
            .day-number { font-size: 0.8rem; }
        }
    </style>
</head>

<div class="app-wrapper">
    <div class="container" id="appRoot"></div>
</div>

    async function carregarDaNuvem() {
        try {
            const response = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, {
                headers: { 'X-Master-Key': JSONBIN_API_KEY }
            });
            if (!response.ok) throw new Error('Erro ao carregar');

            return data.record;
        } catch (error) {
            console.error("Erro nuvem:", error);
            return null;
        }
    }

                headers: {
                    'Content-Type': 'application/json',
                    'X-Master-Key': JSONBIN_API_KEY

                body: JSON.stringify(dados)
            });

            console.error("Erro ao salvar:", error);
            return false;

        el: '#appRoot',

                <div v-if="modalEditarMusicaVisible" class="modal-overlay" @click.self="fecharModalEditarMusica"><div class="glass-card modal-content"><div class="flex-between"><h2>✏️ Editar Música</h2><button @click="fecharModalEditarMusica" class="small-btn">✖</button></div><div class="input-group"><label>Nome da Música</label><input v-model="musicaEditando.nome" placeholder="Nome"></div><div class="input-group"><label>Link da Cifra</label><input v-model="musicaEditando.link" placeholder="Link"></div><div class="input-group"><label>Tom Original</label><select v-model="musicaEditando.tomOriginal"><option value="">Selecione</option><option v-for="t in tons" :key="t">{{ t }}</option></select></div><div class="input-group"><label>Letra (para busca)</label><textarea v-model="musicaEditando.letra" rows="3" placeholder="Letra da música..."></textarea></div><div class="modal-buttons"><button @click="salvarEdicaoMusica" class="modal-danger-btn">💾 Salvar</button><button @click="fecharModalEditarMusica" class="modal-cancel-btn">Cancelar</button></div></div></div>
                <div v-if="showSetupModal" class="modal-overlay" @click.self="cancelarSetup"><div class="glass-card" style="max-width:400px;"><h2>✨ Criar senha</h2><p>Olá <strong>{{ pendingEmail }}</strong></p><input type="password" v-model="setupPwd" placeholder="Senha (min 4)"><input type="password" v-model="setupConfirm" placeholder="Confirmar"><button @click="finalizarSetup">Salvar</button><button @click="cancelarSetup" class="small-btn delete-btn">Cancelar</button></div></div>
            </div>
        `,
        data() {
            return {
                currentUser: null, loginEmail: "", loginPassword: "", loginMessage: "", loginMessageType: "",
                globalMessage: "", globalMsgType: "", activeTab: "repertorio", syncActive: false,
                modoCriarConta: false, criarEmail: "",
                repertorioSemanal: {}, semanaOffset: 0,
                musicasSelecionadas: [], buscaMusicaRepertorio: "",
                diaSelecionadoParaAdicionar: 0,
                ano: new Date().getFullYear(), mes: new Date().getMonth(), escalaData: {},
                modalEscalaVisible: false, diaSelecionado: null, membrosSelecionadosTemp: [],
                eventosData: {}, anoEventos: new Date().getFullYear(), mesEventos: new Date().getMonth(),
                modalEventoVisible: false, diaEventoSelecionado: null, novoEventoModal: { nome: "", horario: "", responsaveis: "" },
                musicas: [], musicasFiltradas: [], buscaMusica: "", novaMusica: { nome: "", link: "", tomOriginal: "", letra: "" }, mostrarFormMusica: false, tons: TONS,
                musicasSubmenu: "principal", cantorSelecionado: null, tomsTemp: {},
                membros: [], novoMembro: { nome: "", email: "", funcao: "canta", instrumentosSelecionados: [] }, mostrarFormMembro: false, instrumentos: INSTRUMENTOS,
                usuariosSistema: [], novoUsuarioEmail: "", adminNewPassword: "", adminConfirmPassword: "",
                showSetupModal: false, pendingEmail: "", setupPwd: "", setupConfirm: "",
                modalEditarMusicaVisible: false, musicaEditando: { id: null, nome: "", link: "", tomOriginal: "", letra: "" },
                modalConfirm: { visible: false, title: "", message: "", confirmText: "Sim", action: null, actionData: null, showDontAsk: false, dontAskAgain: false, storageKey: "" }
            }
        },
        computed: {
            nomeMes() { return ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"][this.mes]; },
            diasCalendario() {
                const primeiro = new Date(this.ano, this.mes, 1), ultimo = new Date(this.ano, this.mes+1, 0), dias = [];
                for(let i=0; i<primeiro.getDay(); i++) dias.push(null);
                for(let i=1; i<=ultimo.getDate(); i++) dias.push(new Date(this.ano, this.mes, i));
                return dias;
            },
            diasCalendarioEventos() {
                const primeiro = new Date(this.anoEventos, this.mesEventos, 1), ultimo = new Date(this.anoEventos, this.mesEventos+1, 0), dias = [];
                for(let i=0; i<primeiro.getDay(); i++) dias.push(null);
                for(let i=1; i<=ultimo.getDate(); i++) dias.push(new Date(this.anoEventos, this.mesEventos, i));
                return dias;
            },
            cantoresLista() { return this.membros.filter(m => m.funcao === 'canta' || m.funcao === 'ambos'); },
            musicasOrdenadas() { return [...this.musicas].sort((a, b) => a.nome.localeCompare(b.nome)); },
            musicasRepertorioFiltradas() {
                const termo = this.buscaMusicaRepertorio.toLowerCase().trim();
                if (!termo) return this.musicasOrdenadas;
                return this.musicasOrdenadas.filter(m => m.nome.toLowerCase().includes(termo));
            },
            // Dias da semana que têm pelo menos uma música
            diasComMusicas() {
                const chave = this.getSemanaKey();
                const semana = this.repertorioSemanal[chave] || { dias: [[],[],[],[],[],[],[]] };
                const diasNomes = ["Segunda-feira", "Terça-feira", "Quarta-feira", "Quinta-feira", "Sexta-feira", "Sábado", "Domingo"];
                const resultado = [];
                for (let i = 0; i < 7; i++) {
                    if (semana.dias[i] && semana.dias[i].length > 0) {
                        resultado.push({
                            diaIdx: i,
                            nome: diasNomes[i],
                            musicas: semana.dias[i]
                        });
                    }
                }
                return resultado;
            },
            tituloSemana() {
                const data = this.getDataInicioSemana();
                const dataFim = new Date(data);
                dataFim.setDate(dataFim.getDate() + 6);
                return `${data.getDate()}/${data.getMonth()+1} a ${dataFim.getDate()}/${dataFim.getMonth()+1}`;
            },
            eventosDoDia() {
                if (!this.diaEventoSelecionado) return [];
                const chave = this.formatDateKeyEventos(this.diaEventoSelecionado);
                return this.eventosData[chave] || [];
            }
        },
        methods: {
            formatDateKey(d) { return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`; },
            formatDateKeyEventos(d) { return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`; },
            getSemanaKey() {
                const hoje = new Date();
                const data = new Date(hoje);
                data.setDate(hoje.getDate() + (this.semanaOffset * 7));
                const primeiroDiaSemana = new Date(data.getFullYear(), data.getMonth(), data.getDate() - data.getDay() + 1);
                return `${primeiroDiaSemana.getFullYear()}-${primeiroDiaSemana.getMonth()+1}-${primeiroDiaSemana.getDate()}`;
            },
            getDataInicioSemana() {
                const hoje = new Date();
                const data = new Date(hoje);
                data.setDate(hoje.getDate() + (this.semanaOffset * 7));
                return new Date(data.getFullYear(), data.getMonth(), data.getDate() - data.getDay() + 1);
            },
            toggleSelecionarMusica(id) {
                const idx = this.musicasSelecionadas.indexOf(id);
                if (idx === -1) this.musicasSelecionadas.push(id);
                else this.musicasSelecionadas.splice(idx, 1);
            },
            adicionarMusicasSelecionadas() {
                if (this.musicasSelecionadas.length === 0) { this.showMsg("Selecione pelo menos uma música", "error-msg"); return; }
                const chave = this.getSemanaKey();
                if (!this.repertorioSemanal[chave]) this.repertorioSemanal[chave] = { dias: [[],[],[],[],[],[],[]] };
                const dia = this.diaSelecionadoParaAdicionar;
                let adicionadas = 0;
                this.musicasSelecionadas.forEach(id => {
                    const existe = this.repertorioSemanal[chave].dias[dia].some(m => m.musicaId === id);
                    if (!existe) {
                        const musica = this.musicas.find(m => m.id === id);
                        if (musica) {
                            this.repertorioSemanal[chave].dias[dia].push({ musicaId: musica.id, nome: musica.nome, link: musica.link });
                            adicionadas++;
                        }
                    }
                });
                this.musicasSelecionadas = [];
                this.afterUpdate();
                this.showMsg(`${adicionadas} música(s) adicionada(s) ao dia!`, "success-msg");
            },
            removerMusicaDoDia(diaIdx, musicaIdx) {
                const chave = this.getSemanaKey();
                if (this.repertorioSemanal[chave] && this.repertorioSemanal[chave].dias) {
                    this.repertorioSemanal[chave].dias[diaIdx].splice(musicaIdx, 1);
                    this.afterUpdate();
                    this.showMsgSilencioso();
                }
            },
            limparRepertorioDia(diaIdx) {
                const chave = this.getSemanaKey();
                if (this.repertorioSemanal[chave] && this.repertorioSemanal[chave].dias) {
                    this.repertorioSemanal[chave].dias[diaIdx] = [];
                    this.afterUpdate();
                    this.showMsg(`Dia limpo!`, "success-msg");
                }
            },
            abrirEditarMusica(musica) {
                this.musicaEditando = { ...musica };
                this.modalEditarMusicaVisible = true;
            },
            fecharModalEditarMusica() {
                this.modalEditarMusicaVisible = false;
                this.musicaEditando = { id: null, nome: "", link: "", tomOriginal: "", letra: "" };
            },
            async salvarEdicaoMusica() {
                const index = this.musicas.findIndex(m => m.id === this.musicaEditando.id);
                if (index !== -1) {
                    this.musicas[index] = { ...this.musicaEditando };
                    await this.afterUpdate();
                    this.musicasFiltradas = this.musicasOrdenadas;
                    this.showMsg("Música atualizada com sucesso!", "success-msg");
                    this.fecharModalEditarMusica();
                }
            },
            musicasDoCantor(cantorNome) { return this.musicas.filter(m => m.tonsCantores?.some(t => t.cantor === cantorNome)); },
            getTomCantor(musicaId, cantorNome) {
                const musica = this.musicas.find(m => m.id === musicaId);
                if (!musica || !musica.tonsCantores) return null;
                const tomInfo = musica.tonsCantores.find(t => t.cantor === cantorNome);
                return tomInfo ? tomInfo.tom : null;
            },
            filtrarMusicas() {
                const termo = this.buscaMusica.toLowerCase().trim();
                if (!termo) { this.musicasFiltradas = this.musicasOrdenadas; return; }
                this.musicasFiltradas = this.musicasOrdenadas.filter(m => m.nome.toLowerCase().includes(termo) || (m.letra && m.letra.toLowerCase().includes(termo)));
            },
            selecionarCantor(nome) { this.cantorSelecionado = nome; this.tomsTemp = {}; },
            async definirTomCantor(musicaId, cantorNome) {
                const tom = this.tomsTemp[musicaId];
                if (!tom) { this.showMsg("Selecione um tom", "error-msg"); return; }
                const musica = this.musicas.find(m => m.id === musicaId);
                if (!musica) return;
                if (!musica.tonsCantores) musica.tonsCantores = [];
                const existingIndex = musica.tonsCantores.findIndex(t => t.cantor === cantorNome);
                if (existingIndex !== -1) musica.tonsCantores[existingIndex].tom = tom;
                else musica.tonsCantores.push({ cantor: cantorNome, tom: tom });
                this.tomsTemp[musicaId] = "";
                await this.afterUpdate();
                this.showMsg(`Tom definido!`, "success-msg");
            },
            async removerTomCantor(musicaId, cantorNome) {
                const musica = this.musicas.find(m => m.id === musicaId);
                if (musica && musica.tonsCantores) {
                    musica.tonsCantores = musica.tonsCantores.filter(t => t.cantor !== cantorNome);
                    await this.afterUpdate();
                    this.showMsg(`Tom removido`, "success-msg");
                }
            },
            semanaAnterior() { this.semanaOffset--; this.musicasSelecionadas = []; },
            proximaSemana() { this.semanaOffset++; this.musicasSelecionadas = []; },
            semanaAtual() { this.semanaOffset = 0; this.musicasSelecionadas = []; },
            mesAnterior() { if(this.mes===0){this.mes=11;this.ano--}else{this.mes--} },
            proximoMes() { if(this.mes===11){this.mes=0;this.ano++}else{this.mes++} },
            mesAtual() { this.ano=new Date().getFullYear(); this.mes=new Date().getMonth(); },
            mesEventosAnterior() { if(this.mesEventos===0){this.mesEventos=11;this.anoEventos--}else{this.mesEventos--} },
            mesEventosProximo() { if(this.mesEventos===11){this.mesEventos=0;this.anoEventos++}else{this.mesEventos++} },
            mesEventosAtual() { this.anoEventos=new Date().getFullYear(); this.mesEventos=new Date().getMonth(); },
            abrirModalEscala(dia) { this.diaSelecionado=dia; const chave=this.formatDateKey(dia); this.membrosSelecionadosTemp=(this.escalaData[chave]||[]).map(m=>m.id); this.modalEscalaVisible=true; },
            fecharModalEscala() { this.modalEscalaVisible=false; this.diaSelecionado=null; },
            membroSelecionado(id) { return this.membrosSelecionadosTemp.includes(id); },
            toggleMembroEscala(id) { const idx=this.membrosSelecionadosTemp.indexOf(id); idx===-1?this.membrosSelecionadosTemp.push(id):this.membrosSelecionadosTemp.splice(idx,1); },
            async salvarEscalaDia() { const chave=this.formatDateKey(this.diaSelecionado); this.escalaData[chave]=this.membros.filter(m=>this.membrosSelecionadosTemp.includes(m.id)); this.fecharModalEscala(); await this.afterUpdate(); this.showMsgSilencioso(); },
            abrirModalEvento(dia) { this.diaEventoSelecionado = dia; this.novoEventoModal = { nome: "", horario: "", responsaveis: "" }; this.modalEventoVisible = true; },
            fecharModalEvento() { this.modalEventoVisible = false; this.diaEventoSelecionado = null; },
            async adicionarEventoModal() {
                if (!this.novoEventoModal.nome) { this.showMsg("Digite o nome do evento", "error-msg"); return; }
                const chave = this.formatDateKeyEventos(this.diaEventoSelecionado);
                if (!this.eventosData[chave]) this.eventosData[chave] = [];
                this.eventosData[chave].push({ id: Date.now(), ...this.novoEventoModal });
                this.novoEventoModal = { nome: "", horario: "", responsaveis: "" };
                await this.afterUpdate();
                this.showMsgSilencioso();
            },
            async removerEventoModal(idx) {
                const chave = this.formatDateKeyEventos(this.diaEventoSelecionado);
                this.eventosData[chave].splice(idx, 1);
                if (this.eventosData[chave].length === 0) delete this.eventosData[chave];
                await this.afterUpdate();
                this.showMsgSilencioso();
            },
            showMsgSilencioso() { /* Apenas sincroniza sem mensagem */ },
            async syncToCloud() {
                if (this.syncActive) return;
                this.syncActive = true;
                const dados = { [CLOUD_KEYS.membros]: this.membros, [CLOUD_KEYS.musicas]: this.musicas, [CLOUD_KEYS.eventos]: this.eventosData, [CLOUD_KEYS.escala]: this.escalaData, [CLOUD_KEYS.usuarios]: this.usuariosSistema, [CLOUD_KEYS.repertorio]: this.repertorioSemanal };
                await salvarNaNuvem(dados);
                this.syncActive = false;
            },
            async afterUpdate() { await this.syncToCloud(); },
            async carregarTudo() {
                this.syncActive = true;
                const dadosNuvem = await carregarDaNuvem();
                if (dadosNuvem && dadosNuvem[CLOUD_KEYS.membros]?.length) {
                    this.membros = dadosNuvem[CLOUD_KEYS.membros];
                    this.musicas = dadosNuvem[CLOUD_KEYS.musicas];
                    this.eventosData = dadosNuvem[CLOUD_KEYS.eventos] || {};
                    this.escalaData = dadosNuvem[CLOUD_KEYS.escala] || {};
                    this.usuariosSistema = dadosNuvem[CLOUD_KEYS.usuarios];
                    this.repertorioSemanal = dadosNuvem[CLOUD_KEYS.repertorio] || {};
                } else {
                    this.membros = []; this.musicas = []; this.eventosData = {}; this.escalaData = {}; this.usuariosSistema = getDefaultUsuarios(); this.repertorioSemanal = {};
                    await this.syncToCloud();
                }
                this.musicasFiltradas = this.musicasOrdenadas;
                this.syncActive = false;
            },
            setLightMode() { document.body.classList.add('light-mode'); document.body.classList.remove('dark-mode'); localStorage.setItem('theme', 'light'); },
            setDarkMode() { document.body.classList.add('dark-mode'); document.body.classList.remove('light-mode'); localStorage.setItem('theme', 'dark'); },
            showMsg(msg, type) { this.globalMessage = msg; this.globalMsgType = type; setTimeout(() => this.globalMessage = "", 3000); },
            confirmarAcao(title, message, action, actionData, confirmText = "Sim", showDontAsk = false, storageKey = "") {
                if (showDontAsk && storageKey && localStorage.getItem(storageKey) === 'true') { action(actionData); return; }
                this.modalConfirm = { visible: true, title, message, confirmText, action, actionData, showDontAsk, dontAskAgain: false, storageKey };
            },
            fecharModalConfirm() { this.modalConfirm.visible = false; this.modalConfirm.dontAskAgain = false; },
            executarAcaoConfirmada() {
                if (this.modalConfirm.action) this.modalConfirm.action(this.modalConfirm.actionData);
                if (this.modalConfirm.showDontAsk && this.modalConfirm.dontAskAgain && this.modalConfirm.storageKey) localStorage.setItem(this.modalConfirm.storageKey, 'true');
                this.fecharModalConfirm();
            },
            confirmarRemoverMusica(musica) { this.confirmarAcao("Remover Música", `Remover "${musica.nome}"?`, this.executarRemoverMusica, musica.id, "Sim", true, "dont_ask_remover_musica"); },
            async executarRemoverMusica(id) { this.musicas = this.musicas.filter(m => m.id !== id); this.musicasFiltradas = this.musicasOrdenadas; await this.afterUpdate(); this.showMsgSilencioso(); },
            confirmarRemoverMembro(membro) { this.confirmarAcao("Remover Membro", `Remover "${membro.nome}"?`, this.executarRemoverMembro, membro.id, "Sim", true, "dont_ask_remover_membro"); },
            async executarRemoverMembro(id) { this.membros = this.membros.filter(m => m.id !== id); for (let chave in this.escalaData) { this.escalaData[chave] = this.escalaData[chave].filter(m => m.id !== id); if (this.escalaData[chave].length === 0) delete this.escalaData[chave]; } await this.afterUpdate(); this.showMsgSilencioso(); },
            confirmarRemoverUsuario(user) { this.confirmarAcao("Remover Acesso", `Remover acesso de "${user.email}"?`, this.executarRemoverUsuario, user.email, "Sim", true, "dont_ask_remover_usuario"); },
            async executarRemoverUsuario(email) { this.usuariosSistema = this.usuariosSistema.filter(u => u.email !== email); await this.afterUpdate(); this.showMsgSilencioso(); },
            confirmarLimparEscalaDia() { if (!this.diaSelecionado) return; this.confirmarAcao("Limpar Escala", `Limpar escala do dia ${this.diaSelecionado.getDate()}/${this.diaSelecionado.getMonth()+1}?`, this.executarLimparEscalaDia, null, "Sim", true, "dont_ask_limpar_escala_dia"); },
            async executarLimparEscalaDia() { delete this.escalaData[this.formatDateKey(this.diaSelecionado)]; this.fecharModalEscala(); await this.afterUpdate(); this.showMsgSilencioso(); },
            async salvarMusica() { if(!this.novaMusica.nome||!this.novaMusica.link){this.showMsg("Preencha nome e link","error-msg");return;} this.musicas.push({id:Date.now(),nome:this.novaMusica.nome,link:this.novaMusica.link,tomOriginal:this.novaMusica.tomOriginal,letra:this.novaMusica.letra,tonsCantores:[]}); this.novaMusica={nome:"",link:"",tomOriginal:"",letra:""}; this.mostrarFormMusica=false; this.musicasFiltradas = this.musicasOrdenadas; await this.afterUpdate(); this.showMsgSilencioso(); },
            async salvarMembro() { if(!this.novoMembro.nome||!this.novoMembro.email){this.showMsg("Nome e e-mail obrigatórios","error-msg");return;} this.membros.push({id:Date.now(),nome:this.novoMembro.nome,email:this.novoMembro.email,funcao:this.novoMembro.funcao,instrumentos:[...this.novoMembro.instrumentosSelecionados]}); this.novoMembro={nome:"",email:"",funcao:"canta",instrumentosSelecionados:[]}; this.mostrarFormMembro=false; await this.afterUpdate(); this.showMsgSilencioso(); },
            async adicionarUsuarioSistema() { if(!this.novoUsuarioEmail.trim()){this.showMsg("Digite um e-mail","error-msg");return;} if(this.usuariosSistema.find(u=>u.email===this.novoUsuarioEmail)){this.showMsg("E-mail já cadastrado","error-msg");return;} this.usuariosSistema.push({email:this.novoUsuarioEmail,password:"",isAdmin:false,canLogin:true}); this.novoUsuarioEmail=""; await this.afterUpdate(); this.showMsgSilencioso(); },
            async changeAdminPassword() { if(!this.adminNewPassword||this.adminNewPassword!==this.adminConfirmPassword||this.adminNewPassword.length<4){this.showMsg("Senhas inválidas","error-msg");return;} const admin=this.usuariosSistema.find(u=>u.email===this.currentUser.email); if(admin){admin.password=this.adminNewPassword;this.currentUser.password=this.adminNewPassword;await this.afterUpdate();this.showMsg("Senha atualizada","success-msg");this.adminNewPassword="";this.adminConfirmPassword="";} },
            async verificarECriarConta() {
                const email = this.criarEmail.trim();
                if(!email){this.loginMessage="Digite um e-mail";this.loginMessageType="error-msg";return;}
                const userExists = this.usuariosSistema.find(u => u.email.toLowerCase() === email.toLowerCase());
                if(!userExists){ this.loginMessage="❌ E-mail não autorizado. Solicite acesso à administradora."; this.loginMessageType="warning-msg"; return; }
                if(userExists.password && userExists.password !== ""){ this.loginMessage="✅ Já possui cadastro! Faça login."; this.loginMessageType="info-msg"; this.modoCriarConta = false; return; }
                this.pendingEmail = email; this.showSetupModal = true; this.criarEmail = ""; this.modoCriarConta = false;
            },
            async doLogin() {
                const email=this.loginEmail.trim(), pwd=this.loginPassword;
                if(!email||!pwd){this.loginMessage="Preencha e-mail e senha";this.loginMessageType="error-msg";return;}
                const user=this.usuariosSistema.find(u=>u.email.toLowerCase()===email.toLowerCase());
                if(user&&!user.password){this.pendingEmail=email;this.showSetupModal=true;this.loginPassword="";return;}
                if(user&&user.password===pwd&&user.canLogin){this.currentUser=user;this.loginEmail="";this.loginPassword="";this.showMsg("Bem-vindo(a)!","success-msg");}
                else{this.loginMessage="Credenciais inválidas";this.loginMessageType="error-msg";}
            },
            logout() { this.currentUser=null; this.activeTab="repertorio"; this.modoCriarConta=false; this.loginEmail=""; this.loginPassword=""; this.semanaOffset=0; this.cantorSelecionado=null; this.musicasSelecionadas=[]; },
            async finalizarSetup() { 
                if(!this.setupPwd||this.setupPwd.length<4||this.setupPwd!==this.setupConfirm){ this.showMsg("Senha inválida (mínimo 4)","error-msg"); return; }
                const user=this.usuariosSistema.find(u=>u.email===this.pendingEmail);
                if(user){ user.password=this.setupPwd; this.currentUser=user; await this.afterUpdate(); this.showSetupModal=false; this.setupPwd=""; this.setupConfirm=""; this.showMsg("Senha criada!","success-msg"); }
            },
            cancelarSetup() { this.showSetupModal=false; this.setupPwd=""; this.setupConfirm=""; }
        },
        async mounted() {
            const savedTheme=localStorage.getItem('theme'); 
            if(savedTheme==='dark') this.setDarkMode(); else this.setLightMode();
            await this.carregarTudo();
        },
        watch: {
            membros: { deep: true, handler() { this.afterUpdate(); } },
            musicas: { deep: true, handler() { this.afterUpdate(); } },
            eventosData: { deep: true, handler() { this.afterUpdate(); } },
            escalaData: { deep: true, handler() { this.afterUpdate(); } },
            usuariosSistema: { deep: true, handler() { this.afterUpdate(); } },
            repertorioSemanal: { deep: true, handler() { this.afterUpdate(); } },
            buscaMusica() { this.filtrarMusicas(); }
        }
    });
</script>
</body>
</html>
